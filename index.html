<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Coding — 说话代替写代码</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --p:#6366f1;--p-l:#818cf8;--p-d:#4f46e5;--a:#f59e0b;--g:#10b981;--r:#ef4444;
  --bg:#f8fafc;--card:#fff;--t:#1e293b;--ts:#64748b;--bd:#e2e8f0;
  --grad:linear-gradient(135deg,#6366f1,#8b5cf6,#a78bfa);
  --hero-bg:linear-gradient(160deg,#eef2ff 0%,#f0fdf4 50%,#fef3c7 100%);
  --shadow:0 4px 24px rgba(99,102,241,.08);
  --shadow-lg:0 12px 48px rgba(99,102,241,.12);
}
body{font-family:'Inter',-apple-system,sans-serif;color:var(--t);line-height:1.7;overflow-x:hidden;background:#fff}

/* ============ LANDING ============ */
#landing{position:fixed;inset:0;background:#fff;z-index:100;transition:background-color .8s ease,opacity .35s 0s,visibility .35s 0s}
#landing.out{opacity:0;visibility:hidden;background-color:transparent}
#landing.clear-bg{background-color:transparent}

/* Background reveal: same gradient as hero, clipped to circle */
#bgReveal{position:fixed;inset:0;background:var(--hero-bg);clip-path:circle(150px at 50% 50%);transition:clip-path 1.1s cubic-bezier(.4,0,.15,1);z-index:1}
#bgReveal.expand{clip-path:circle(150vmax at 50% 50%)}

/* Soft decorative orbs inside the circle area */
.bg-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.3;pointer-events:none}
.bg-orb:nth-child(1){width:300px;height:300px;background:#818cf8;top:30%;right:20%;animation:drift 12s ease-in-out infinite}
.bg-orb:nth-child(2){width:220px;height:220px;background:#34d399;bottom:25%;left:15%;animation:drift 12s ease-in-out -5s infinite}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(25px,-18px) scale(1.04)}66%{transform:translate(-18px,12px) scale(.96)}}

/* Text layer on top of circle — vertical, same font as hero */
#orbTextWrap{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;display:flex;flex-direction:column;align-items:center;pointer-events:none}
.orb-line{font-size:clamp(28px,5vw,48px);font-weight:900;letter-spacing:-1px;line-height:1.15;transition:transform 1s cubic-bezier(.4,0,.15,1)}
.orb-line.hl{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.orb-line.dark{color:var(--t)}
.orb-line.mid{color:var(--ts);font-weight:700;font-size:clamp(18px,3.2vw,28px);transition:transform 1s cubic-bezier(.4,0,.15,1),opacity .5s ease}
.orb-hint{color:var(--ts);font-size:11px;font-weight:500;margin-top:16px;letter-spacing:2px;text-transform:uppercase;opacity:.6;transition:opacity .3s}
#orbTextWrap.moving .orb-line.mid,#orbTextWrap.moving .orb-hint{opacity:0}
#orbTextWrap.hidden{opacity:0;transition:opacity 0s}

/* Ripple rings — gradient echo using same bg as main circle */
.ring-layer{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden}
.ring{position:absolute;border-radius:50%;top:50%;left:50%;background:var(--hero-bg);-webkit-mask-image:radial-gradient(circle,transparent 84%,rgba(0,0,0,.55) 88%,rgba(0,0,0,.55) 95%,transparent 100%);mask-image:radial-gradient(circle,transparent 84%,rgba(0,0,0,.55) 88%,rgba(0,0,0,.55) 95%,transparent 100%)}
.ring-1{width:320px;height:320px;margin:-160px 0 0 -160px;animation:ringPulse 3.8s ease-out infinite}
.ring-2{width:400px;height:400px;margin:-200px 0 0 -200px;animation:ringPulse 3.8s ease-out 1s infinite}
.ring-3{width:490px;height:490px;margin:-245px 0 0 -245px;animation:ringPulse 3.8s ease-out 2s infinite}
.ring-4{width:590px;height:590px;margin:-295px 0 0 -295px;animation:ringPulse 3.8s ease-out 3s infinite}
@keyframes ringPulse{0%{opacity:.5;transform:scale(.9)}50%{opacity:.1}100%{opacity:0;transform:scale(1.18)}}
.ring-layer.out .ring{animation:none;opacity:0;transition:opacity .3s}

/* Click hint */
.click-hint{position:fixed;bottom:calc(50% - 180px);left:50%;transform:translateX(-50%);z-index:3;color:var(--ts);font-size:13px;font-weight:500;letter-spacing:1px;animation:hintBlink 2.5s ease-in-out infinite;transition:opacity .3s}
.click-hint.out{opacity:0}
@keyframes hintBlink{0%,100%{opacity:.5}50%{opacity:.15}}

/* Click area (invisible, covers circle area) */
#orbClick{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:260px;height:260px;border-radius:50%;cursor:pointer;z-index:10;transition:transform .3s}
#orbClick:hover{transform:translate(-50%,-50%) scale(1.06)}
#orbClick:active{transform:translate(-50%,-50%) scale(.96)}

/* ============ MAIN APP (behind landing) ============ */
#app{opacity:0;min-height:100vh;position:relative;z-index:0;transition:opacity 0s}
#app.show{opacity:1}
.hero-add{opacity:0;transition:opacity .5s .1s}
.hero-add.show{opacity:1}
.hero-badge,.hero-case-btn,.hero-c>p,.hero-stats,.menu-grid{opacity:0;transform:translateY(16px);transition:opacity .5s ease,transform .5s ease}
.hero-badge.show,.hero-case-btn.show{opacity:1;transform:none;transition-delay:.05s}
.hero-c>p.show{opacity:1;transform:none;transition-delay:.15s}
.hero-stats.show{opacity:1;transform:none;transition-delay:.25s}
.menu-grid.show{opacity:1;transform:none;transition-delay:.4s}

/* HERO */
.hero-main{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:var(--hero-bg)}
.hero-orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.3;animation:drift 12s ease-in-out infinite}
.hero-orb:nth-child(1){width:500px;height:500px;background:#818cf8;top:-10%;right:-8%}
.hero-orb:nth-child(2){width:350px;height:350px;background:#34d399;bottom:-8%;left:-5%;animation-delay:-5s}
.hero-orb:nth-child(3){width:300px;height:300px;background:#fbbf24;top:50%;left:40%;animation-delay:-8s}

.hero-c{position:relative;z-index:2;text-align:center;padding:72px 24px 0;max-width:700px}
.hero-top-bar{display:flex;align-items:center;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:28px}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(99,102,241,.1);color:var(--p);padding:8px 20px;border-radius:100px;font-size:13px;font-weight:700;border:1px solid rgba(99,102,241,.2)}
.hero-case-btn{display:flex;align-items:center;justify-content:space-between;gap:16px;max-width:520px;margin:0 auto 30px;padding:16px 18px;border-radius:18px;background:linear-gradient(135deg,#f59e0b,#fb7185);color:#fff;text-decoration:none;text-align:left;box-shadow:0 16px 36px rgba(245,158,11,.22);border:1px solid rgba(255,255,255,.55);transition:transform .25s ease,box-shadow .25s ease,filter .25s ease;cursor:pointer}
.hero-case-btn:hover{transform:translateY(-3px);box-shadow:0 22px 44px rgba(245,158,11,.28);filter:saturate(1.05)}
.hero-case-btn:active{transform:translateY(0) scale(.98)}
.hero-case-btn:focus-visible{outline:3px solid rgba(99,102,241,.28);outline-offset:4px}
.case-icon{font-size:30px;line-height:1;filter:drop-shadow(0 2px 4px rgba(15,23,42,.18))}
.case-copy{flex:1;min-width:0}
.case-main{display:block;font-size:18px;font-weight:900;line-height:1.2}
.case-sub{display:block;margin-top:4px;font-size:12px;font-weight:600;line-height:1.5;color:rgba(255,255,255,.86)}
.case-arrow{flex-shrink:0;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.2);font-size:22px;font-weight:900}
.hero-badge span{animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hero-c h1{font-size:clamp(28px,5vw,48px);font-weight:900;line-height:1.15;margin-bottom:16px;letter-spacing:-1px}
.hero-c h1 .hl{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-c>p{font-size:16px;color:var(--ts);max-width:500px;margin:0 auto 28px}
.hero-stats{display:flex;gap:32px;justify-content:center;flex-wrap:wrap;margin-bottom:40px}
.hero-num{text-align:center}
.hero-num .v{font-size:28px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-num .l{font-size:12px;color:var(--ts);margin-top:2px}

/* Menu grid */
.menu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:540px;margin:0 auto}
.menu-item{background:rgba(255,255,255,.85);backdrop-filter:blur(10px);border:1px solid var(--bd);border-radius:16px;padding:24px 16px;cursor:pointer;text-align:center;transition:.3s;position:relative;overflow:hidden}
.menu-item::before{content:'';position:absolute;inset:0;background:var(--grad);opacity:0;transition:opacity .3s}
.menu-item:hover::before{opacity:.05}
.menu-item:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:rgba(99,102,241,.3)}
.menu-item:active{transform:translateY(0) scale(.97)}
.menu-item .mi-ico{font-size:32px;margin-bottom:10px;display:block;position:relative;z-index:1}
.menu-item .mi-title{display:block;font-size:15px;font-weight:800;position:relative;z-index:1;margin-bottom:6px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.menu-item .mi-desc{display:block;font-size:12px;color:var(--ts);position:relative;z-index:1;line-height:1.6}

/* ============ DETAIL VIEW ============ */
#detail{position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto;transform:translateX(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);-webkit-overflow-scrolling:touch}
#detail.open{transform:translateX(0)}

.detail-top{position:sticky;top:0;z-index:10;background:rgba(248,250,252,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:0 120px 0 24px}
.detail-bar{max-width:720px;margin:0 auto;display:flex;align-items:center;height:56px;gap:14px}
.back-btn{display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--p);font-size:14px;font-weight:600;padding:6px 14px;border-radius:8px;border:none;background:rgba(99,102,241,.08);transition:.2s}
.back-btn:hover{background:rgba(99,102,241,.15)}
.detail-title{font-size:16px;font-weight:800;flex:1}

.detail-body{max-width:720px;margin:0 auto;padding:28px 24px 60px}

.d-label{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--p);margin-bottom:10px}
.d-label::before{content:'';width:20px;height:2px;background:var(--p);border-radius:2px}
.d-title{font-size:clamp(22px,3.5vw,32px);font-weight:800;letter-spacing:-.5px;margin-bottom:10px;line-height:1.2}
.d-desc{font-size:15px;color:var(--ts);max-width:560px;margin-bottom:28px}

.callout{background:linear-gradient(135deg,#eef2ff,#fef3c7);border-radius:14px;padding:24px;margin:20px 0;border:1px solid rgba(99,102,241,.15)}
.callout h4{font-size:16px;font-weight:800;margin-bottom:8px}
.callout p{font-size:14px;color:var(--ts);line-height:1.8}

.cmp{width:100%;border-collapse:separate;border-spacing:0;background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--bd);margin:14px 0;font-size:13px}
.cmp th{background:var(--grad);color:#fff;padding:12px 16px;font-size:13px;font-weight:600;text-align:left}
.cmp td{padding:10px 16px;border-bottom:1px solid var(--bd)}
.cmp tr:last-child td{border-bottom:none}

.tl{position:relative;padding-left:28px;margin:16px 0}
.tl::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:var(--bd)}
.tl-item{position:relative;margin-bottom:18px}
.tl-item::before{content:'';position:absolute;left:-22px;top:6px;width:10px;height:10px;border-radius:50%;background:var(--p);border:2px solid #fff;box-shadow:0 0 0 2px var(--p)}
.tl-item .yr{font-size:12px;font-weight:700;color:var(--p);margin-bottom:2px}
.tl-item .ev{font-size:13px;color:var(--ts)}

.acc{border:1px solid var(--bd);border-radius:14px;background:var(--card);margin-bottom:10px;overflow:hidden;transition:box-shadow .3s}
.acc:hover{box-shadow:var(--shadow)}
.acc-h{padding:18px 22px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:background .2s;user-select:none}
.acc-h:hover{background:rgba(99,102,241,.03)}
.acc-h .ico{flex-shrink:0;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.acc-h .txt{flex:1}
.acc-h .txt h4{font-size:15px;font-weight:700;margin-bottom:2px}
.acc-h .txt p{font-size:13px;color:var(--ts)}
.acc-h .arrow{font-size:14px;color:var(--ts);transition:transform .3s;flex-shrink:0}
.acc.open .acc-h .arrow{transform:rotate(90deg)}
.acc-b{max-height:0;overflow:hidden;transition:max-height .5s ease}
.acc.open .acc-b{max-height:5000px}
.acc-inner{padding:0 22px 22px}

.acc2{border:1px solid #f1f5f9;border-radius:10px;background:#fafbfc;margin-bottom:8px;overflow:hidden}
.acc2 .acc-h{padding:14px 18px}
.acc2 .acc-h .ico{width:30px;height:30px;border-radius:8px;font-size:14px}
.acc2 .acc-h .txt h4{font-size:14px}
.acc2 .acc-h .txt p{font-size:12px}
.acc2 .acc-b{max-height:0;overflow:hidden;transition:max-height .4s ease}
.acc2.open .acc-b{max-height:3000px}

.acc3{border:1px dashed #e2e8f0;border-radius:8px;background:#fff;margin-bottom:6px;overflow:hidden}
.acc3 .acc-h{padding:12px 16px}
.acc3 .acc-h .ico{width:26px;height:26px;border-radius:6px;font-size:12px}
.acc3 .acc-h .txt h4{font-size:13px;font-weight:600}
.acc3 .acc-h .txt p{font-size:11px}
.acc3 .acc-b{max-height:0;overflow:hidden;transition:max-height .3s ease}
.acc3.open .acc-b{max-height:1500px}

.tag{display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600}
.tag-p{background:rgba(99,102,241,.1);color:var(--p)}
.tag-a{background:rgba(245,158,11,.1);color:var(--a)}
.tag-g{background:rgba(16,185,129,.1);color:var(--g)}
.tag-r{background:rgba(239,68,68,.1);color:var(--r)}

.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:14px 0}
.stat-card{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:14px;text-align:center}
.stat-card .n{font-size:20px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-card .l{font-size:11px;color:var(--ts);margin-top:2px}

.chart-wrap{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:20px;margin:16px 0}
.chart-wrap h5{font-size:14px;font-weight:700;margin-bottom:12px}
.chart{width:100%;height:300px}

.ben-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.ben{padding:20px;background:var(--card);border:1px solid var(--bd);border-radius:12px;transition:.3s}
.ben:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.ben .emoji{font-size:28px;margin-bottom:8px}
.ben h4{font-size:15px;font-weight:700;margin-bottom:4px}
.ben p{font-size:13px;color:var(--ts)}

.step{display:flex;gap:20px;padding:24px;background:var(--card);border:1px solid var(--bd);border-radius:14px;margin-bottom:16px;transition:.3s;position:relative;overflow:hidden}
.step::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--grad)}
.step:hover{box-shadow:var(--shadow);transform:translateX(4px)}
.step .num{flex-shrink:0;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;background:var(--grad)}
.step h4{font-size:16px;font-weight:700;margin-bottom:6px}
.step p{font-size:14px;color:var(--ts)}
.step .sub{margin-top:10px;font-size:13px;color:var(--ts);padding-top:10px;border-top:1px dashed var(--bd)}

.adv{display:flex;gap:16px;padding:18px;background:var(--card);border:1px solid var(--bd);border-radius:12px;margin-bottom:10px;transition:.2s}
.adv:hover{box-shadow:var(--shadow);transform:translateX(4px)}
.adv .pr{flex-shrink:0;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff}
.pr1{background:var(--r)}.pr2{background:var(--a)}.pr3{background:var(--g)}
.adv h4{font-size:14px;font-weight:700;margin-bottom:2px}
.adv p{font-size:13px;color:var(--ts)}

.footer-note{text-align:center;padding:32px 24px 24px;color:var(--ts);font-size:12px;border-top:1px solid var(--bd);margin-top:24px}

@media(max-width:640px){
  .menu-grid{grid-template-columns:repeat(2,1fr)}
  .hero-c{padding:72px 18px 0}
  .hero-case-btn{width:100%;padding:14px 16px;margin-bottom:28px;border-radius:16px}
  .case-main{font-size:17px}
  .case-sub{font-size:12px}
  #bgReveal{clip-path:circle(110px at 50% 50%)}
  .orb-line{font-size:clamp(22px,6vw,34px)}
  .orb-line.mid{font-size:clamp(14px,4vw,22px)}
  .ring-1{width:250px;height:250px;margin:-125px 0 0 -125px}.ring-2{width:310px;height:310px;margin:-155px 0 0 -155px}.ring-3{width:380px;height:380px;margin:-190px 0 0 -190px}.ring-4{width:460px;height:460px;margin:-230px 0 0 -230px}
  #orbClick{width:220px;height:220px}
  .ben-grid{grid-template-columns:1fr}
  .stat-row{grid-template-columns:1fr 1fr}
}

/* ============ 123 Logo ============ */
.logo-123{position:fixed;top:16px;left:auto;right:calc(16px + env(safe-area-inset-right,0px));z-index:9999;height:40px;border-radius:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.12);cursor:pointer;transition:transform .3s,box-shadow .3s;background:#fff;display:flex;align-items:center;padding:4px}
.logo-123:hover{transform:scale(1.08);box-shadow:0 4px 20px rgba(0,0,0,.2)}
.logo-123 img{height:100%;width:auto;object-fit:contain}
@media(max-width:480px){.logo-123{height:32px;top:12px;right:calc(12px + env(safe-area-inset-right,0px));border-radius:8px;padding:3px}}
</style>
</head>

<script>
let expanded = false;
let chartsInited = {};

function expandOrb(){
  if(expanded) return;
  expanded = true;

  // Start clearing landing white bg immediately (matches clip-path expansion timing)
  document.getElementById('landing').classList.add('clear-bg');

  // Make app layout-visible for position calculation (still opacity:0)
  const app = document.getElementById('app');
  app.style.visibility = 'visible';
  app.style.position = 'relative';
  app.style.zIndex = '0';

  const heroSH = document.getElementById('heroShuoHua');
  const heroXDM = document.getElementById('heroXieDaiMa');
  const orbSH = document.getElementById('orbShuoHua');
  const orbXDM = document.getElementById('orbXieDaiMa');

  // Get rects
  const shRect = heroSH.getBoundingClientRect();
  const xdmRect = heroXDM.getBoundingClientRect();
  const orbSHRect = orbSH.getBoundingClientRect();
  const orbXDMRect = orbXDM.getBoundingClientRect();

  // Calculate deltas (from orb position to hero position)
  const dSHx = (shRect.left + shRect.width/2) - (orbSHRect.left + orbSHRect.width/2);
  const dSHy = (shRect.top + shRect.height/2) - (orbSHRect.top + orbSHRect.height/2);
  const dXDMx = (xdmRect.left + xdmRect.width/2) - (orbXDMRect.left + orbXDMRect.width/2);
  const XDMy = (xdmRect.top + xdmRect.height/2) - (orbXDMRect.top + orbXDMRect.height/2);

  // Scale factor (should be ~1.0 since orb and hero use same font-size clamp)
  const heroFS = parseFloat(getComputedStyle(heroSH).fontSize);
  const orbFS = parseFloat(getComputedStyle(orbSH).fontSize);
  const scale = heroFS / orbFS;

  // Move "说话" and "写代码" — keep them fully opaque (no opacity transition)
  orbSH.style.transition = 'transform 1s cubic-bezier(.4,0,.15,1)';
  orbXDM.style.transition = 'transform 1s cubic-bezier(.4,0,.15,1)';
  orbSH.style.transform = `translate(${dSHx}px, ${dSHy}px) scale(${scale})`;
  orbXDM.style.transform = `translate(${dXDMx}px, ${XDMy}px) scale(${scale})`;

  // Fade out "就能" and "？" and hint
  document.getElementById('orbTextWrap').classList.add('moving');

  // Expand background circle
  document.getElementById('bgReveal').classList.add('expand');

  // Hide rings and click hint
  document.querySelector('.ring-layer').classList.add('out');
  document.querySelector('.click-hint').classList.add('out');

  // Disable click area
  document.getElementById('orbClick').style.pointerEvents = 'none';
  document.getElementById('orbClick').style.opacity = '0';

  // At ~700ms: start fading in hero-add words ("用","代替","的时代")
  setTimeout(()=>{
    document.querySelectorAll('.hero-add').forEach(el=>el.classList.add('show'));
  }, 700);

  // At ~950ms: text has arrived — instant swap orb→hero (same position & font = seamless)
  setTimeout(()=>{
    document.getElementById('orbTextWrap').classList.add('hidden');
    // Clear inline styles, let CSS class take over
    app.style.opacity = '';
    app.style.visibility = '';
    app.style.position = '';
    app.style.zIndex = '';
    app.classList.add('show');
    document.getElementById('landing').classList.add('out');
    // Stagger in remaining hero content
    setTimeout(()=>{document.querySelector('.hero-badge').classList.add('show');document.querySelector('.hero-case-btn').classList.add('show')},50);
    setTimeout(()=>document.querySelector('.hero-c>p').classList.add('show'),150);
    setTimeout(()=>document.querySelector('.hero-stats').classList.add('show'),250);
    setTimeout(()=>document.querySelector('.menu-grid').classList.add('show'),380);
    initCountUp();
  }, 950);
}

function openDetail(idx){
  const detail = document.getElementById('detail');
  const title = document.getElementById('detailTitle');
  const body = document.getElementById('detailBody');
  title.textContent = modules[idx].title;
  body.innerHTML = modules[idx].html;
  detail.classList.add('open');
  detail.scrollTop = 0;
  setTimeout(()=>{
    if(modules[idx].charts) modules[idx].charts.forEach(id=>initChart(id));
  },120);
}

function closeDetail(){
  document.getElementById('detail').classList.remove('open');
  Object.keys(chartsInited).forEach(k=>{chartsInited[k].dispose();delete chartsInited[k]});
}

function togAcc(el,ev){ev&&ev.stopPropagation();el.classList.toggle('open')}

// ============ COUNT UP ============
function initCountUp(){
  const obs = new IntersectionObserver(es=>es.forEach(e=>{
    if(e.isIntersecting){
      const el=e.target,t=+el.dataset.t;let c=0;const s=t/40,timer=setInterval(()=>{c+=s;if(c>=t){c=t;clearInterval(timer)}el.textContent=Math.round(c)},30);obs.unobserve(el)
    }
  }),{threshold:.5});
  document.querySelectorAll('.cu').forEach(el=>obs.observe(el));
}

// ============ CHARTS ============
function initChart(id){
  if(chartsInited[id]) return;
  const el = document.getElementById(id);
  if(!el) return;
  const c = echarts.init(el);
  chartsInited[id] = c;
  if(chartDefs[id]) c.setOption(chartDefs[id]);
  window.addEventListener('resize',()=>c.resize());

<div class="acc" onclick="togAcc(this)"><div class="acc-h"><div class="ico" style="background:rgba(239,68,68,.1)">😵</div><div class="txt"><h4>"不动脑"陷阱 — 最危险的坑 <span class="tag tag-r">风险1</span></h4><p>用AI当"老师"成绩更好，用AI当"代写"成绩更差</p></div><div class="arrow">▶</div></div><div class="acc-b"><div class="acc-inner"><p style="font-size:14px;color:var(--ts);margin-bottom:14px">UC Irvine研究了110名本科生、19,418个AI交互发现两种截然不同的使用方式：</p><div class="acc2" onclick="togAcc(this,event)"><div class="acc-h"><div class="ico" style="background:rgba(16,185,129,.08)">✅</div><div class="txt"><h4>探究式求助 — 成绩更好</h4><p>"为什么这样做？""还有其他方法吗？"</p></div><div class="arrow" style="font-size:12px">▶</div></div><div class="acc-b"><div class="acc-inner"><p style="font-size:13px;color:var(--ts)">顶尖学生像和老师对话一样，逐步深入理解原理。AI成了"导师"。</p><div class="acc3" onclick="togAcc(this,event)"><div class="acc-h"><div class="ico" style="background:rgba(16,185,129,.06)">💬</div><div class="txt"><h4>示例对话</h4></div><div class="arrow" style="font-size:10px">▶</div></div><div class="acc-b"><div class="acc-inner"><p style="font-size:12px;color:var(--ts);background:#f0fdf4;padding:10px;border-radius:8px;margin-bottom:6px">👤 "AI，为什么这里用循环而不是递归？"</p><p style="font-size:12px;color:var(--ts);background:#eef2ff;padding:10px;border-radius:8px;margin-bottom:6px">🤖 "循环在这类场景下内存效率更高…"</p><p style="font-size:12px;color:var(--ts);background:#f0fdf4;padding:10px;border-radius:8px">👤 "那什么情况下递归更好呢？"</p></div></div></div></div></div></div><div class="acc2" onclick="togAcc(this,event)"><div class="acc-h"><div class="ico" style="background:rgba(239,68,68,.08)">❌</div><div class="txt"><h4>执行式求助 — 成绩更差</h4><p>"帮我做""给我答案""直接改完"</p></div><div class="arrow" style="font-size:12px">▶</div></div><div class="acc-b"><div class="acc-inner"><p style="font-size:13px;color:var(--ts)">看起来完成了作业，但实际理解很浅。AI是"镜子"——它反映你的意图，不会主动帮你理解。</p><div class="acc3" onclick="togAcc(this,event)"><div class="acc-h"><div class="ico" style="background:rgba(239,68,68,.06)">💬</div><div class="txt"><h4>示例对话</h4></div><div class="arrow" style="font-size:10px">▶</div></div><div class="acc-b"><div class="acc-inner"><p style="font-size:12px;color:var(--ts);background:#fef2f2;padding:10px;border-radius:8px;margin-bottom:6px">👤 "帮我做这个作业"</p><p style="font-size:12px;color:var(--ts);background:#eef2ff;padding:10px;border-radius:8px;margin-bottom:6px">🤖 [直接给完整答案代码]</p><p style="font-size:12px;color:var(--ts);background:#fef2f2;padding:10px;border-radius:8px">👤 "改成对的" [不知道哪错]</p></div></div></div></div></div></div><div class="chart-wrap"><h5>📊 两种方式的能力差距</h5><div class="chart" id="c2"></div></div></div></div></div>
<div class="acc" onclick="togAcc(this)"><div class="acc-h"><div class="ico" style="background:rgba(239,68,68,.1)">🐛</div><div class="txt"><h4>"快但不稳" — 安全隐患 <span class="tag tag-r">风险2</span></h4><p>91.5%的Vibe Coding应用存在安全漏洞</p></div><div class="arrow">▶</div></div><div class="acc-b"><div class="acc-inner"><div class="stat-row"><div class="stat-card"><div class="n">91.5%</div><div class="l">应用存在安全漏洞</div></div><div class="stat-card"><div class="n">45%</div><div class="l">未通过基础安全标准</div></div><div class="stat-card"><div class="n">6x</div><div class="l">漏洞月增速</div></div></div><p style="font-size:13px;color:var(--ts)">Vibe Coding创造了一类"脆弱开发者"——能构建产品但无法调试。<strong>所以"读代码"和"安全审查"能力特别重要。</strong></p></div></div></div>
<div class="acc" onclick="togAcc(this)"><div class="acc-h"><div class="ico" style="background:rgba(239,68,68,.1)">🦽</div><div class="txt"><h4>过度依赖 — "永远不拆训练轮" <span class="tag tag-r">风险3</span></h4><p>脚手架模型：初期撑着你，能力上来后要逐步拆掉</p></div><div class="arrow">▶</div></div><div class="acc-b"><div class="acc-inner"><div class="acc2" onclick="togAcc(this,event)"><div class="acc-h"><div class="ico" style="background:rgba(16,185,129,.08)">1️⃣</div><div class="txt"><h4>初期：高依赖 ✅ 正常</h4><p>AI帮你快速出成果，建立信心</p></div><div class="arrow" style="font-size:12px">▶</div></div><div class="acc-b"><div class="acc-inner"><p style="font-size:13px;color:var(--ts)">这个阶段AI是学习加速器。不需要担心"依赖"——这是正常的学习起点。</p></div></div></div><div class="acc2" onclick="togAcc(this,event)"><div class="acc-h"><div class="ico" style="background:rgba(245,158,11,.08)">2️⃣</div><div class="txt"><h4>中期：逐步减少 ⚠️ 关键</h4><p>开始理解代码原理，能独立修改</p></div><div class="arrow" style="font-size:12px">▶</div></div><div class="acc-b"><div class="acc-inner"><p style="font-size:13px;color:var(--ts)">从"AI写我看"过渡到"我写AI帮"。这个阶段最关键——决定了你是"会用AI的人"还是"离了AI不行的人"。</p></div></div></div><div class="acc2" onclick="togAcc(this,event)"><div class="acc-h"><div class="ico" style="background:rgba(99,102,241,.08)">3️⃣</div><div class="txt"><h4>后期：AI协作 🎯 目标</h4><p>能独立编程，AI是效率工具而非拐杖</p></div><div class="arrow" style="font-size:12px">▶</div></div><div class="acc-b"><div class="acc-inner"><p style="font-size:13px;color:var(--ts)">最终目标：成为"AI时代的架构师"，而不是"被AI替代的码农"。</p></div></div></div></div></div></div>
  `},

  {title:'给家长和学生的6条建议',charts:[],html:`
<div class="d-label">行动建议</div>
<div class="d-desc">不是"会不会写代码"的竞争，而是"会不会和AI一起工作"的竞争。</div>
<div class="adv"><div class="pr pr1">1</div><div><h4>先学"读代码"，再学"写代码"</h4><p>能看懂代码比能写代码更稀缺、更有价值。就像先学会品鉴文章，再学写作。</p></div></div>
<div class="adv"><div class="pr pr1">2</div><div><h4>用AI"学习"而不是"代劳"</h4><p>问"为什么这样做？"成绩更好，说"帮我做"成绩更差。差距非常大。</p></div></div>
<div class="adv"><div class="pr pr2">3</div><div><h4>学习系统设计和架构思维</h4><p>这是AI最难替代的能力，也是薪资最高的方向。</p></div></div>
<div class="adv"><div class="pr pr2">4</div><div><h4>建立安全意识</h4><p>91.5%的AI生成代码有安全隐患，不懂安全就不及格。</p></div></div>
<div class="adv"><div class="pr pr3">5</div><div><h4>精通1-2款AI编程工具</h4><p>工具使用已经是基本技能，不是加分项。国内多款工具个人版免费。</p></div></div>
<div class="adv"><div class="pr pr3">6</div><div><h4>保持对多种编程语言的基础了解</h4><p>防止被单一工具"锁住"，多一种语言多一条路。不需要精通，但要能读懂。</p></div></div>
<div class="callout"><h4>💡 最好的学习路径</h4><p>用Vibe Coding<strong>快速体验创造</strong> → 逐步<strong>理解代码原理</strong> → 学会<strong>审查和改进AI的输出</strong> → 最终成为<strong>"AI时代的架构师"</strong>，而不是"被AI替代的码农"。</p></div>
