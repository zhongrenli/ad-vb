<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天气查询Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg-sunny:linear-gradient(180deg,#FFA726 0%,#FFCC80 100%);
--bg-cloudy:linear-gradient(180deg,#78909C 0%,#B0BEC5 100%);
--bg-rainy:linear-gradient(180deg,#455A64 0%,#78909C 100%);
--bg-default:linear-gradient(180deg,#87CEEB 0%,#E0F4FF 100%);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;background:var(--bg-default);transition:background 0.8s ease}
.container{max-width:480px;margin:0 auto;padding:16px;position:relative;z-index:1}
.header{position:relative;margin-bottom:16px}
.search-box{display:flex;gap:8px;margin-bottom:16px}
.search-box input{flex:1;padding:12px 16px;border:none;border-radius:24px;font-size:16px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.search-box button{padding:12px 20px;border:none;border-radius:24px;background:rgba(255,255,255,0.9);color:#333;font-size:14px;cursor:pointer}
.fav-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:8px}
.main-card{background:rgba(255,255,255,0.95);border-radius:20px;padding:24px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,0.1);margin-bottom:16px;position:relative;overflow:hidden}
.city-row{display:flex;justify-content:center;align-items:center;gap:8px;margin-bottom:16px}
.city-name{font-size:22px;color:#333;font-weight:500}
.weather-icon{width:100px;height:100px;margin:16px auto;position:relative}
.sun{width:60px;height:60px;background:#FFD54F;border-radius:50%;position:absolute;top:20px;left:20px;box-shadow:0 0 30px #FFD54F;animation:spin 20s linear infinite}
.sun-rays{position:absolute;width:100%;height:100%;animation:spin 20s linear infinite}
.ray{position:absolute;width:4px;height:15px;background:#FFD54F;border-radius:2px;top:5px;left:48px;transform-origin:50% 45px}
.cloud{width:70px;height:30px;background:#ECEFF1;border-radius:15px;position:absolute;top:35px;left:15px;box-shadow:0 5px 10px rgba(0,0,0,0.1)}
.cloud::before{content:'';width:35px;height:35px;background:#ECEFF1;border-radius:50%;position:absolute;top:-15px;left:10px}
.cloud::after{content:'';width:25px;height:25px;background:#ECEFF1;border-radius:50%;position:absolute;top:-10px;left:30px}
.rain-drop{position:absolute;width:3px;height:12px;background:#64B5F6;border-radius:2px;animation:fall 0.8s linear infinite}
.current-temp{font-size:64px;font-weight:300;color:#333;line-height:1}
.weather-desc{font-size:18px;color:#666;margin:8px 0 16px}
.aqi-bar{height:8px;border-radius:4px;margin-top:12px;transition:all 0.5s}
.aqi-label{font-size:12px;color:#666;margin-top:4px}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes fall{0%{transform:translateY(-10px);opacity:1}100%{transform:translateY(30px);opacity:0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.float-anim{animation:float 3s ease-in-out infinite}
.forecast{display:flex;justify-content:space-between;gap:8px;margin-bottom:16px}
.forecast-card{background:rgba(255,255,255,0.95);border-radius:16px;padding:12px;flex:1;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.forecast-date{font-size:12px;color:#999;margin-bottom:4px}
.forecast-icon{font-size:28px;margin:8px 0}
.forecast-temp{font-size:14px;color:#333}
.chart-card{background:rgba(255,255,255,0.95);border-radius:20px;padding:20px;box-shadow:0 4px 16px rgba(0,0,0,0.1);margin-bottom:16px}
.chart-title{font-size:14px;color:#666;margin-bottom:16px}
#tempChart{max-width:100%}
.info-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.info-card{background:rgba(255,255,255,0.95);border-radius:16px;padding:16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.info-label{font-size:12px;color:#999;margin-bottom:4px}
.info-value{font-size:18px;font-weight:600;color:#333}
.tips-card{background:rgba(255,255,255,0.95);border-radius:20px;padding:20px;box-shadow:0 4px 16px rgba(0,0,0,0.1)}
.tip-title{font-size:14px;color:#666;margin-bottom:8px}
.tip-content{font-size:16px;color:#333;line-height:1.6}
.fav-panel{background:rgba(255,255,255,0.98);border-radius:16px;padding:16px;margin-bottom:16px;display:none}
.fav-title{font-size:14px;color:#666;margin-bottom:12px}
.fav-list{display:flex;flex-wrap:wrap;gap:8px}
.fav-item{padding:8px 16px;background:#f5f5f5;border-radius:20px;font-size:14px;cursor:pointer;transition:all 0.2s}
.fav-item:hover{background:#e0e0e0}
.fav-item.active{background:#2196F3;color:#fff}
.loading{text-align:center;padding:40px;color:#666}
.error{text-align:center;padding:20px;color:#f44336}
.hidden{display:none}
</style>
</head>
<body>
<div class="container">
<div class="header">
<div class="search-box">
<input type="text" id="cityInput" placeholder="输入城市名" value="北京">
<button id="searchBtn">查询</button>
<button class="fav-btn" id="favBtn">☆</button>
</div>
<div class="fav-panel" id="favPanel">
<div class="fav-title">收藏城市</div>
<div class="fav-list" id="favList"></div>
</div>
</div>
<div id="mainContent">
<div class="main-card">
<div class="city-row">
<div class="city-name" id="cityName">北京</div>
</div>
<div class="weather-icon" id="weatherIcon"></div>
<div class="current-temp" id="currentTemp">--°</div>
<div class="weather-desc" id="weatherDesc">加载中...</div>
<div class="aqi-bar" id="aqiBar"></div>
<div class="aqi-label" id="aqiLabel"></div>
</div>
<div class="forecast" id="forecast"></div>
<div class="chart-card">
<div class="chart-title">24小时温度趋势</div>
<canvas id="tempChart" width="420" height="160"></canvas>
</div>
<div class="info-cards">
<div class="info-card">
<div class="info-label">风力</div>
<div class="info-value" id="wind">--</div>
</div>
<div class="info-card">
<div class="info-label">湿度</div>
<div class="info-value" id="humidity">--%</div>
</div>
<div class="info-card">
<div class="info-label">气压</div>
<div class="info-value" id="pressure">--hPa</div>
</div>
</div>
<div class="tips-card">
<div class="tip-title">穿衣建议</div>
<div class="tip-content" id="clothesTip">--</div>
</div>
</div>
</div>
<script>
const cities=[
{name:'北京',pinyin:'beijing'},{name:'上海',pinyin:'shanghai'},{name:'广州',pinyin:'guangzhou'},
{name:'深圳',pinyin:'shenzhen'},{name:'杭州',pinyin:'hangzhou'},{name:'成都',pinyin:'chengdu'},
{name:'重庆',pinyin:'chongqing'},{name:'武汉',pinyin:'wuhan'},{name:'西安',pinyin:'xian'},
{name:'南京',pinyin:'nanjing'},{name:'天津',pinyin:'tianjin'},{name:'苏州',pinyin:'suzhou'},
{name:'郑州',pinyin:'zhengzhou'},{name:'长沙',pinyin:'changsha'},{name:'沈阳',pinyin:'shenyang'}
];
let currentCity='北京';
let favorites=JSON.parse(localStorage.getItem('weatherFavorites')||'["北京"]');
let currentData=null;

function updateBgTheme(weather){
const body=document.body;
if(weather.includes('晴')&&!weather.includes('多云')){
body.style.background='var(--bg-sunny)';
}else if(weather.includes('雨')||weather.includes('雪')){
body.style.background='var(--bg-rainy)';
}else{
body.style.background='var(--bg-cloudy)';
}
}

function renderWeatherIcon(type){
const icon=document.getElementById('weatherIcon');
if(type.includes('晴')){
icon.innerHTML=`<div class="sun-rays"><div class="ray"></div><div class="ray" style="transform:rotate(45deg)"></div><div class="ray" style="transform:rotate(90deg)"></div><div class="ray" style="transform:rotate(135deg)"></div></div><div class="sun"></div>`;
}else if(type.includes('多云')||type.includes('阴')){
icon.innerHTML=`<div class="cloud float-anim"></div>`;
}else if(type.includes('雨')){
icon.innerHTML=`<div class="cloud"></div><div class="rain-drop" style="left:20px;animation-delay:0s"></div><div class="rain-drop" style="left:40px;animation-delay:0.3s"></div><div class="rain-drop" style="left:60px;animation-delay:0.6s"></div>`;
}else{
icon.innerHTML=`<div class="cloud"></div>`;
}
}

function renderAqi(aqi){
const bar=document.getElementById('aqiBar');
const label=document.getElementById('aqiLabel');
let color,bgColor,text;
if(aqi<=50){color='#4CAF50';bgColor='#4CAF50';text='优'}
else if(aqi<=100){color='#8BC34A';bgColor='#8BC34A';text='良'}
else if(aqi<=150){color='#FFEB3B';bgColor='#FFC107';text='轻度污染'}
else if(aqi<=200){color='#FF9800';bgColor='#FF9800';text='中度污染'}
else if(aqi<=300){color='#F44336';bgColor='#F44336';text='重度污染'}
else{color='#9C27B0';bgColor='#9C27B0';text='严重污染'}
bar.style.background=`linear-gradient(90deg,${bgColor} ${aqi/5}%,#e0e0e0 ${aqi/5}%)`;
label.textContent=`空气质量指数 AQI: ${aqi} ${text}`;
}

function getClothesTip(temp){
if(temp<5)return '天气寒冷,建议穿羽绒服,厚棉衣,保暖内衣等';
if(temp<10)return '天气较冷,建议穿厚外套,毛衣,牛仔裤';
if(temp<15)return '天气微凉,建议穿外套,薄毛衣,长裤';
if(temp<20)return '天气凉爽,建议穿长袖衬衫,薄外套,牛仔裤';
if(temp<25)return '天气温暖,建议穿长袖,T恤,薄裤子';
if(temp<30)return '天气较热,建议穿短袖,薄裤,裙子';
return '天气炎热,建议穿轻薄短袖,短裤,注意防暑';
}

function renderForecast(forecast){
const container=document.getElementById('forecast');
container.innerHTML=forecast.map(day=>`
<div class="forecast-card">
<div class="forecast-date">${day.date}</div>
<div class="forecast-icon">${getEmoji(day.weather)}</div>
<div class="forecast-temp">${day.high}°/${day.low}°</div>
</div>
`).join('');
}

function getEmoji(desc){
desc=desc||'';
if(desc.includes('晴'))return '☀️';
if(desc.includes('多云'))return '⛅';
if(desc.includes('阴'))return '☁️';
if(desc.includes('雨'))return '🌧️';
if(desc.includes('雪'))return '❄️';
return '🌤️';
}

function drawChart(hourly){
const canvas=document.getElementById('tempChart');
const ctx=canvas.getContext('2d');
const w=canvas.width;
const h=canvas.height;
const padding=30;
ctx.clearRect(0,0,w,h);
const minTemp=Math.min(...hourly)-2;
const maxTemp=Math.max(...hourly)+2;
const chartW=w-padding*2;
const chartH=h-padding*2;
ctx.strokeStyle='#E0E0E0';
ctx.lineWidth=1;
for(let i=0;i<=4;i++){
const y=padding+i*(chartH/4);
ctx.beginPath();
ctx.moveTo(padding,y);
ctx.lineTo(w-padding,y);
ctx.stroke();
}
const gradient=ctx.createLinearGradient(0,padding,0,h-padding);
gradient.addColorStop(0,'rgba(33,150,243,0.3)');
gradient.addColorStop(1,'rgba(33,150,243,0)');
ctx.fillStyle=gradient;
ctx.beginPath();
ctx.moveTo(padding,h-padding);
const now=new Date();
const hour=now.getHours();
for(let i=0;i<hourly.length;i++){
const x=padding+i*(chartW/(hourly.length-1));
const y=h-padding-((hourly[i]-minTemp)/(maxTemp-minTemp))*chartH;
if(i===0)ctx.lineTo(x,y);
else ctx.lineTo(x,y);
}
ctx.lineTo(w-padding,h-padding);
ctx.closePath();
ctx.fill();
ctx.strokeStyle='#2196F3';
ctx.lineWidth=2;
ctx.beginPath();
for(let i=0;i<hourly.length;i++){
const x=padding+i*(chartW/(hourly.length-1));
const y=h-padding-((hourly[i]-minTemp)/(maxTemp-minTemp))*chartH;
if(i===0)ctx.moveTo(x,y);
else ctx.lineTo(x,y);
}
ctx.stroke();
ctx.fillStyle='#2196F3';
for(let i=0;i<hourly.length;i++){
const x=padding+i*(chartW/(hourly.length-1));
const y=h-padding-((hourly[i]-minTemp)/(maxTemp-minTemp))*chartH;
ctx.beginPath();
ctx.arc(x,y,4,0,Math.PI*2);
ctx.fill();
}
ctx.fillStyle='#666';
ctx.font='11px sans-serif';
ctx.textAlign='center';
for(let i=0;i<24;i+=6){
const x=padding+i*(chartW/23);
const h=(hour+i)%24;
ctx.fillText(h+'时',x,h-2);
}
}

function generateMockData(cityName){
const temps=[18,19,20,22,24,26,28,29,30,29,28,26,25,24,23,22,21,20,19,19,18,18,18,18];
const weathers=['晴','多云','晴','多云','晴','晴','多云','晴','晴','晴','多云','晴','晴','晴','晴','多云','晴','晴','晴','多云','晴','晴','晴','晴'];
const now=new Date();
const hour=now.getHours();
const shifted=[];
const weathersShifted=[];
for(let i=0;i<24;i++){
const idx=(hour+i)%24;
shifted.push(temps[idx]+Math.floor(Math.random()*3)-1);
weathersShifted.push(weathers[idx]);
}
return{
temp:shifted[0],
desc:weathersShifted[0],
wind:Math.floor(Math.random()*5+1)+'级',
humidity:Math.floor(Math.random()*40+40),
pressure:Math.floor(Math.random()*30+990),
aqi:Math.floor(Math.random()*150+30),
hourly:shifted,
hourlyWeather:weathersShifted,
forecast:generateForecast()
};
}

function generateForecast(){
const result=[];
const now=new Date();
const weathers=['晴','多云','晴','阴','小雨'];
for(let i=1;i<=5;i++){
const date=new Date(now);
date.setDate(date.getDate()+i);
result.push({
date:(date.getMonth()+1)+'/'+date.getDate(),
weather:weathers[i-1],
high:Math.floor(Math.random()*10+25),
low:Math.floor(Math.random()*10+15)
});
}
return result;
}

let lastWeatherQueryTime = 0;
const WEATHER_COOLDOWN = 10000; // 天气查询冷却10秒

async function fetchWeather(cityName){
try{
const encoded=encodeURIComponent(cityName);
const response=await fetch(`https://wttr.in/${encoded}?format=j1`);
const data=await response.json();
const current=data.current_condition[0];
return{
temp:parseInt(current.temp_C),
desc:current.lang_zh[0].value,
wind:current.windspeedKmph+'km/h',
humidity:current.humidity+'%',
pressure:current.pressure,
aqi:Math.floor(Math.random()*150+30),
hourly:generateHourlyFromCurrent(parseInt(current.temp_C)),
hourlyWeather:Array(24).fill(current.lang_zh[0].value),
forecast:data.weather.slice(0,5).map(d=>({
date:(new Date(d.date)).getMonth()+1+'/'+(new Date(d.date)).getDate(),
weather:d.lang_zh[0].value,
high:parseInt(d.maxtempC),
low:parseInt(d.mintempC)
}))
};
}catch(e){
console.log('API failed, using mock data');
return generateMockData(cityName);
}
}

function generateHourlyFromCurrent(baseTemp){
const result=[baseTemp];
for(let i=1;i<24;i++){
result.push(baseTemp+Math.sin(i/24*Math.PI)*5+Math.floor(Math.random()*3)-1);
}
return result;
}

async function renderWeather(cityName){
var now=Date.now();
if(now-lastWeatherQueryTime<WEATHER_COOLDOWN){
var remain=Math.ceil((WEATHER_COOLDOWN-(now-lastWeatherQueryTime))/1000);
showToast?showToast('查询太频繁,'+remain+'秒后可重试'):alert('查询太频繁,'+remain+'秒后可重试');
return;
}
lastWeatherQueryTime=now;
document.getElementById('mainContent').innerHTML='<div class="loading">加载中...</div>';
try{
const data=await fetchWeather(cityName);
currentData=data;
document.getElementById('cityName').textContent=cityName;
document.getElementById('currentTemp').textContent=data.temp+'°';
document.getElementById('weatherDesc').textContent=data.desc;
document.getElementById('wind').textContent=data.wind;
document.getElementById('humidity').textContent=data.humidity+'%';
document.getElementById('pressure').textContent=data.pressure+'hPa';
document.getElementById('clothesTip').textContent=getClothesTip(data.temp);
renderWeatherIcon(data.desc);
updateBgTheme(data.desc);
renderAqi(data.aqi);
renderForecast(data.forecast);
drawChart(data.hourly);
updateFavBtn();
}catch(e){
document.getElementById('mainContent').innerHTML='<div class="error">加载失败,请重试</div>';
}
}

function updateFavorites(){
const favList=document.getElementById('favList');
favList.innerHTML=favorites.map(c=>`
<span class="fav-item ${c===currentCity?'active':''}" data-city="${c}">${c}</span>
`).join('');
favList.querySelectorAll('.fav-item').forEach(item=>{
item.addEventListener('click',()=>{
currentCity=item.dataset.city;
document.getElementById('cityInput').value=currentCity;
renderWeather(currentCity);
});
});
}

function updateFavBtn(){
const btn=document.getElementById('favBtn');
btn.textContent=favorites.includes(currentCity)?'★':'☆';
}

function toggleFav(){
const idx=favorites.indexOf(currentCity);
if(idx>-1){
favorites.splice(idx,1);
}else{
favorites.push(currentCity);
}
localStorage.setItem('weatherFavorites',JSON.stringify(favorites));
updateFavorites();
updateFavBtn();
}

document.getElementById('searchBtn').addEventListener('click',()=>{
const name=document.getElementById('cityInput').value.trim();
const city=cities.find(c=>c.name===name||c.pinyin===name);
if(city){
currentCity=city.name;
renderWeather(currentCity);
}else{
alert('未找到城市');
}
});

document.getElementById('cityInput').addEventListener('keypress',(e)=>{
if(e.key==='Enter'){
const name=document.getElementById('cityInput').value.trim();
const city=cities.find(c=>c.name===name||c.pinyin===name);
if(city){
currentCity=city.name;
renderWeather(currentCity);
}
}
});

document.getElementById('favBtn').addEventListener('click',toggleFav);
document.getElementById('favPanel').addEventListener('click',(e)=>{
if(e.target===document.getElementById('favPanel')){
document.getElementById('favPanel').style.display='none';
}
});

document.querySelector('.fav-btn').addEventListener('click',()=>{
const panel=document.getElementById('favPanel');
panel.style.display=panel.style.display==='block'?'none':'block';
updateFavorites();
});

updateFavorites();
renderWeather(currentCity);

function showToast(msg){
var t=document.getElementById('toast');
if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity 0.3s';document.body.appendChild(t);}
t.textContent=msg;t.style.opacity='1';
setTimeout(function(){t.style.opacity='0';},2000);
}
</script>
</body>
</html>
