<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>英语填词-进阶版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Arial',sans-serif;background:#1a1a2e;min-height:100vh;color:#fff}
.container{max-width:700px;margin:0 auto;padding:20px}
h1{color:#6c63ff;text-align:center;margin:20px 0;font-size:2rem;text-shadow:0 0 20px rgba(108,99,255,0.5)}
.panel{background:rgba(255,255,255,0.05);border-radius:15px;padding:20px;margin-bottom:15px;border:1px solid rgba(108,99,255,0.3)}
.panel-title{color:#6c63ff;font-size:1.1rem;margin-bottom:15px;display:flex;align-items:center;gap:8px}
.form-group{margin-bottom:15px}
.form-group label{display:block;margin-bottom:8px;color:rgba(255,255,255,0.8);font-size:0.9rem}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px;border-radius:8px;border:1px solid rgba(108,99,255,0.3);background:rgba(255,255,255,0.1);color:#fff;font-size:14px}
.form-group textarea{min-height:100px;resize:vertical;font-family:monospace}
.form-row{display:flex;gap:15px;flex-wrap:wrap}
.form-row .form-group{flex:1;min-width:120px}
.btn{display:inline-block;padding:12px 25px;border:none;border-radius:10px;cursor:pointer;font-size:15px;transition:all 0.3s}
.btn-primary{background:#6c63ff;color:#fff}
.btn-primary:hover{background:#5a52d5;transform:translateY(-2px);box-shadow:0 5px 15px rgba(108,99,255,0.4)}
.btn-secondary{background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2)}
.btn-secondary:hover{background:rgba(255,255,255,0.2)}
.btn-group{display:flex;gap:10px;flex-wrap:wrap}
.btn.active{background:#6c63ff;box-shadow:0 0 15px rgba(108,99,255,0.5)}
.word-display{display:flex;justify-content:center;flex-wrap:wrap;gap:8px;margin:25px 0;min-height:60px}
.letter-box{width:42px;height:52px;border:3px solid #fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:bold;transition:all 0.3s}
.letter-box.filled{border-color:#4caf50;background:rgba(76,175,80,0.2)}
.letter-box.missing{border-color:#6c63ff;background:rgba(108,99,255,0.2)}
.letter-box.correct{animation:correctFlash 0.35s ease}
.letter-box.wrong{animation:wrongShake 0.5s ease;border-color:#f44336;background:rgba(244,67,54,0.3)}
.letter-box.current{border-color:#2196f3;box-shadow:0 0 15px rgba(33,150,243,0.8);animation:pulse 1s infinite}
.letter-box.completed{border-color:#ffd700;background:linear-gradient(135deg,rgba(255,215,0,0.4),rgba(255,215,0,0.2));color:#ffd700;text-shadow:0 0 10px rgba(255,215,0,0.8)}
@keyframes correctFlash{0%,100%{transform:scale(1);background:rgba(76,175,80,0.2)}50%{transform:scale(1.15);background:rgba(76,175,80,0.6)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
@keyframes pulse{0%,100%{box-shadow:0 0 10px rgba(33,150,243,0.5)}50%{box-shadow:0 0 25px rgba(33,150,243,1)}}
.stats{display:flex;justify-content:space-around;margin:15px 0;flex-wrap:wrap;gap:10px}
.stat{text-align:center;padding:10px 20px;background:rgba(255,255,255,0.05);border-radius:10px;min-width:80px}
.stat-value{font-size:1.6rem;color:#6c63ff;font-weight:bold}
.stat-label{color:rgba(255,255,255,0.6);font-size:0.8rem;margin-top:3px}
.progress-bar{height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;margin:15px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,#6c63ff,#ff6584);transition:width 0.3s ease;border-radius:4px}
.timer{text-align:center;font-size:1.3rem;color:#ff6584;margin:10px 0}
.keyboard{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;max-width:500px;margin:0 auto}
.key{height:48px;border:none;border-radius:8px;background:linear-gradient(135deg,#2a2a4a,#1a1a2e);color:#fff;font-size:17px;font-weight:bold;cursor:pointer;transition:all 0.15s;border:1px solid rgba(108,99,255,0.3)}
.key:hover{background:linear-gradient(135deg,#3a3a5a,#2a2a4e);transform:translateY(-2px)}
.key:active{transform:translateY(1px);background:#1a1a2e}
.key.special{background:rgba(108,99,255,0.3);font-size:11px}
.result-panel{display:none;background:rgba(255,255,255,0.05);border-radius:15px;padding:25px;border:2px solid #6c63ff}
.result-panel.show{display:block}
.result-title{text-align:center;color:#6c63ff;font-size:1.4rem;margin-bottom:20px}
.result-stats{display:flex;justify-content:space-around;flex-wrap:wrap;gap:15px;margin-bottom:20px}
.word-list{max-height:250px;overflow-y:auto;margin:15px 0}
.word-item{display:flex;justify-content:space-between;align-items:center;padding:10px;border-bottom:1px solid rgba(255,255,255,0.1)}
.word-item .word{color:#ffd700;font-weight:bold;font-size:1rem}
.word-item .status{font-size:0.85rem}
.word-item .status.correct{color:#4caf50}
.word-item .status.wrong{color:#f44336}
.buttons{display:flex;justify-content:center;gap:15px;margin-top:20px;flex-wrap:wrap}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="container">
<h1>English Fill-in-the-Blank Pro</h1>
<div id="setupScreen">
<div class="panel">
<div class="panel-title">难度预设</div>
<div class="btn-group">
<button class="btn btn-secondary" onclick="setDifficulty('easy')">简单</button>
<button class="btn btn-secondary" onclick="setDifficulty('medium')">中等</button>
<button class="btn btn-secondary" onclick="setDifficulty('hard')">困难</button>
</div>
</div>
<div class="panel">
<div class="panel-title">游戏配置</div>
<div class="form-row">
<div class="form-group">
<label>每轮单词数</label>
<select id="wordCount"><option value="3">3</option><option value="5">5</option><option value="10" selected>10</option><option value="15">15</option><option value="20">20</option><option value="30">30</option></select>
</div>
<div class="form-group">
<label>缺损字母数</label>
<select id="missingCount"><option value="1">1</option><option value="2" selected>2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option></select>
</div>
</div>
<div class="form-row">
<div class="form-group">
<label>单词最短长度</label>
<select id="minLength"><option value="3" selected>3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option></select>
</div>
<div class="form-group">
<label>单词最长长度</label>
<select id="maxLength"><option value="6">6</option><option value="8">8</option><option value="10">10</option><option value="12" selected>12</option></select>
</div>
</div>
</div>
<div class="panel">
<div class="panel-title">自定义词库 (可选,一行一个词)</div>
<div class="form-group">
<textarea id="customWords" placeholder="例如:&#10;butterfly&#10;wonderful&#10;adventure"></textarea>
</div>
</div>
<div class="panel">
<div class="btn-group" style="justify-content:center">
<button class="btn btn-primary" style="padding:15px 50px;font-size:1.2rem" onclick="startGame()">开始挑战</button>
</div>
</div>
</div>
<div id="gameScreen" class="hidden">
<div class="timer">⏱️ <span id="timeDisplay">0:00</span></div>
<div class="stats">
<div class="stat"><div class="stat-value" id="correctCount">0</div><div class="stat-label">正确</div></div>
<div class="stat"><div class="stat-value" id="wrongCount">0</div><div class="stat-label">错误</div></div>
<div class="stat"><div class="stat-value" id="accuracy">100%</div><div class="stat-label">准确率</div></div>
<div class="stat"><div class="stat-value" id="progress">1/10</div><div class="stat-label">进度</div></div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:10%"></div></div>
<div class="word-display" id="wordDisplay"></div>
<div class="keyboard" id="keyboard"></div>
<div class="buttons" style="margin-top:20px">
<button class="btn btn-secondary" onclick="returnToSetup()">返回设置</button>
</div>
</div>
<div id="resultScreen" class="hidden">
<div class="panel result-panel show">
<div class="result-title">挑战完成!</div>
<div class="result-stats">
<div class="stat"><div class="stat-value" id="finalCorrect">0</div><div class="stat-label">正确数</div></div>
<div class="stat"><div class="stat-value" id="finalWrong">0</div><div class="stat-label">错误数</div></div>
<div class="stat"><div class="stat-value" id="finalAccuracy">0%</div><div class="stat-label">准确率</div></div>
<div class="stat"><div class="stat-value" id="finalTime">0s</div><div class="stat-label">用时</div></div>
</div>
<div class="word-list" id="wordList"></div>
<div class="buttons">
<button class="btn btn-primary" onclick="restartGame()">重新开始</button>
<button class="btn btn-secondary" onclick="returnToSetup()">返回设置</button>
</div>
</div>
</div>
</div>
<script>
const defaultLibrary=[
"apple","banana","orange","grape","cherry","strawberry","watermelon","pineapple","mango","peach",
"carrot","tomato","potato","onion","cabbage","broccoli","pepper","cucumber","lettuce","celery",
"running","jumping","walking","swimming","flying","dancing","singing","reading","writing","drawing",
"cooking","cleaning","playing","working","studying","resting","sleeping","thinking","laughing","crying",
"happy","sad","angry","excited","nervous","tired","hungry","thirsty","sleepy","scared",
"house","home","room","kitchen","bedroom","bathroom","garden","street","school","office",
"teacher","student","friend","family","mother","father","brother","sister","parent","grandma",
"beautiful","wonderful","amazing","awesome","brilliant","excellent","fantastic","incredible","outstanding","remarkable",
"computer","laptop","phone","tablet","camera","television","refrigerator","microwave","keyboard","monitor",
"sunrise","sunset","moonlight","starlight","rainbow","cloudy","sunny","windy","stormy","snowy",
"mountain","river","ocean","forest","desert","island","valley","canyon","waterfall","beach",
"butterfly","dolphin","elephant","giraffe","penguin","kangaroo","octopus","butterfly","firefly","ladybug",
"adventure","treasure","journey","explore","discover","wonder","magic","mystery","secret","legend"
];
const difficultySettings={easy:{minMissing:1,maxMissing:2},medium:{minMissing:2,maxMissing:3},hard:{minMissing:3,maxMissing:5}};
const keys=['q','w','e','r','t','y','u','i','o','p','a','s','d','f','g','h','j','k','l','z','x','c','v','b','n','m'];
let state={words:[],currentIndex:0,currentLetterIndex:0,correctCount:0,wrongCount:0,isLocked:false,startTime:0,totalWords:10,timerInterval:null,results:[],difficulty:'medium',minMissing:2,maxMissing:3,minLen:3,maxLen:12};
function setDifficulty(diff){state.difficulty=diff;const s=difficultySettings[diff];state.minMissing=s.minMissing;state.maxMissing=s.maxMissing;document.getElementById('missingCount').value=Math.floor((s.minMissing+s.maxMissing)/2);document.querySelectorAll('.btn-group .btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active')}
function createKeyboard(){const kb=document.getElementById('keyboard');kb.innerHTML='';keys.forEach(key=>{const btn=document.createElement('button');btn.className='key';btn.textContent=key.toUpperCase();btn.onclick=()=>handleInput(key);kb.appendChild(btn)});const backspace=document.createElement('button');backspace.className='key special';backspace.textContent='DEL';backspace.onclick=()=>handleBackspace();kb.appendChild(backspace)}
function handleInput(letter){if(state.isLocked)return;const current=state.words[state.currentIndex];const missingIndex=current.missingIndices[state.currentLetterIndex];const expected=current.word[missingIndex].toLowerCase();const boxes=document.querySelectorAll('.letter-box');const currentBox=boxes[missingIndex];if(letter===expected){currentBox.textContent=letter.toUpperCase();currentBox.classList.add('correct','filled');current.currentGuess+=letter;state.currentLetterIndex++;setNextActive(boxes);if(state.currentLetterIndex>=current.missingCount){setTimeout(()=>completeWord(current,boxes),400)}}else{currentBox.textContent=letter.toUpperCase();currentBox.classList.add('wrong');state.wrongCount++;current.errors++;state.isLocked=true;setTimeout(()=>{currentBox.textContent='';currentBox.classList.remove('wrong');state.isLocked=false},500)}}
function handleBackspace(){if(state.isLocked)return;if(state.currentLetterIndex>0){state.currentLetterIndex--;const current=state.words[state.currentIndex];const missingIndex=current.missingIndices[state.currentLetterIndex];current.currentGuess=current.currentGuess.slice(0,-1);const boxes=document.querySelectorAll('.letter-box');const box=boxes[missingIndex];box.textContent='';box.classList.remove('filled','correct');setNextActive(boxes)}}
function setNextActive(boxes){boxes.forEach((b,i)=>b.classList.remove('current'));const current=state.words[state.currentIndex];if(state.currentLetterIndex<current.missingCount){const missingIndex=current.missingIndices[state.currentLetterIndex];boxes[missingIndex].classList.add('current')}}
function completeWord(word,boxes){const missingIndices=word.missingIndices;for(const idx of missingIndices){boxes[idx].classList.add('completed')}state.correctCount++;state.results.push({word:word.word,correct:true,errors:word.errors||0});setTimeout(()=>nextWord(),800)}
function nextWord(){state.currentIndex++;state.currentLetterIndex=0;if(state.currentIndex>=state.words.length){endGame();return}renderWord();updateStats()}
function renderWord(){const word=state.words[state.currentIndex];const display=document.getElementById('wordDisplay');display.innerHTML='';for(let i=0;i<word.word.length;i++){const box=document.createElement('div');box.className='letter-box';if(word.missingIndices.includes(i)){box.classList.add('missing');if(state.currentLetterIndex<word.missingCount&&word.missingIndices[state.currentLetterIndex]===i){box.classList.add('current')}}else{box.textContent=word.word[i].toUpperCase();box.classList.add('filled')}display.appendChild(box)}}
function updateStats(){document.getElementById('correctCount').textContent=state.correctCount;document.getElementById('wrongCount').textContent=state.wrongCount;const total=state.currentIndex+(state.currentLetterIndex>0?1:0);const accuracy=total>0?Math.round((state.correctCount/total)*100):100;document.getElementById('accuracy').textContent=accuracy+'%';document.getElementById('progress').textContent=`${state.currentIndex+1}/${state.words.length}`;document.getElementById('progressFill').style.width=`${((state.currentIndex+1)/state.words.length)*100}%`}
function updateTimer(){const elapsed=Math.floor((Date.now()-state.startTime)/1000);document.getElementById('timeDisplay').textContent=Math.floor(elapsed/60)+':'+(elapsed%60).toString().padStart(2,'0')}
function startGame(){const wordCount=parseInt(document.getElementById('wordCount').value);const missingRange=parseInt(document.getElementById('missingCount').value);const minLen=parseInt(document.getElementById('minLength').value);const maxLen=parseInt(document.getElementById('maxLength').value);const customInput=document.getElementById('customWords').value.trim();let customWords=[];if(customInput){customWords=customInput.split('\n').map(w=>w.trim().toLowerCase()).filter(w=>w.length>=minLen&&w.length<=maxLen)}
const library=[...defaultLibrary,...customWords].filter(w=>w.length>=minLen&&w.length<=maxLen);const shuffled=[...library].sort(()=>Math.random()-0.5);const selected=shuffled.slice(0,wordCount);state.words=[];state.currentIndex=0;state.currentLetterIndex=0;state.correctCount=0;state.wrongCount=0;state.isLocked=false;state.results=[];for(const w of selected){const maxMiss=Math.min(missingRange,Math.floor(w.length*0.6));const missingCount=Math.max(1,Math.floor(Math.random()*(maxMiss-0))+1);const indices=[0];while(indices.length<missingCount){const idx=Math.floor(Math.random()*w.length);if(!indices.includes(idx)){indices.push(idx)}}indices.sort((a,b)=>a-b);state.words.push({word:w,missingIndices:indices,missingCount:missingCount,currentGuess:'',errors:0})}state.startTime=Date.now();if(state.timerInterval)clearInterval(state.timerInterval);state.timerInterval=setInterval(updateTimer,1000);document.getElementById('setupScreen').classList.add('hidden');document.getElementById('gameScreen').classList.remove('hidden');document.getElementById('resultScreen').classList.add('hidden');createKeyboard();renderWord();updateStats();document.addEventListener('keydown',handleKeyDown)}
function handleKeyDown(e){if(e.key==='Backspace'){handleBackspace()}else if(/^[a-zA-Z]$/.test(e.key)){handleInput(e.key.toLowerCase())}}
function endGame(){clearInterval(state.timerInterval);const elapsed=Math.floor((Date.now()-state.startTime)/1000);const total=state.words.length;const accuracy=Math.round((state.correctCount/total)*100);document.getElementById('finalCorrect').textContent=state.correctCount;document.getElementById('finalWrong').textContent=state.wrongCount;document.getElementById('finalAccuracy').textContent=accuracy+'%';document.getElementById('finalTime').textContent=elapsed+'s';const list=document.getElementById('wordList');list.innerHTML='';for(const r of state.results){const item=document.createElement('div');item.className='word-item';item.innerHTML=`<span class="word">${r.word}</span><span class="status ${r.errors>0?'wrong':'correct'}">${r.errors===0?'正确':'错误x'+r.errors}</span>`;list.appendChild(item)}document.getElementById('gameScreen').classList.add('hidden');document.getElementById('resultScreen').classList.remove('hidden');document.removeEventListener('keydown',handleKeyDown)}
function restartGame(){startGame()}
function returnToSetup(){clearInterval(state.timerInterval);document.getElementById('setupScreen').classList.remove('hidden');document.getElementById('gameScreen').classList.add('hidden');document.getElementById('resultScreen').classList.add('hidden');document.removeEventListener('keydown',handleKeyDown)}
</script>
</body>
</html>
