<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>俄罗斯方块 - 进阶版</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background: #0d0d1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    touch-action: none;
}
.container {
    display: flex;
    gap: 20px;
    align-items: flex-start;
}
.side-panel {
    display: flex;
    flex-direction: column;
    gap: 15px;
    color: #fff;
    font-size: 14px;
}
.panel-box {
    background: linear-gradient(145deg, #1a1a2e, #16213e);
    border: 1px solid #3a3a5a;
    border-radius: 8px;
    padding: 12px;
    min-width: 100px;
    text-align: center;
}
.panel-box h3 {
    color: #6a6a8a;
    font-size: 11px;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
}
.panel-box .value {
    font-size: 20px;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 0 10px rgba(100,200,255,0.5);
}
.panel-box.highlight {
    border-color: #667eea;
    box-shadow: 0 0 15px rgba(102,126,234,0.3);
}
#holdCanvas, #nextCanvas {
    display: block;
    margin: 8px auto 0;
    background: #0a0a15;
    border-radius: 4px;
}
#gameCanvas {
    border: 2px solid #4a4a6a;
    box-shadow: 0 0 40px rgba(80,80,180,0.4);
    border-radius: 4px;
}
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 100;
}
.overlay.hidden {
    display: none;
}
.overlay h1 {
    color: #fff;
    font-size: 42px;
    margin-bottom: 15px;
    text-shadow: 0 0 30px rgba(100,100,255,0.6);
}
.overlay p {
    color: #8a8aaa;
    font-size: 16px;
    margin-bottom: 8px;
}
.btn {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    border: none;
    padding: 14px 36px;
    font-size: 18px;
    border-radius: 25px;
    cursor: pointer;
    margin-top: 18px;
    transition: transform 0.2s, box-shadow 0.2s;
}
.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px rgba(102,126,234,0.6);
}
.controls {
    margin-top: 25px;
    color: #555;
    font-size: 13px;
    text-align: center;
    line-height: 1.8;
}
.combo-display {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 0 30px rgba(255,200,0,0.8);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 50;
}
.combo-display.show {
    opacity: 1;
}
</style>
</head>
<body>
<div id="startScreen" class="overlay">
    <h1>俄罗斯方块</h1>
    <p>进阶版 - 包含 Hold / 幽灵方块 / 连击</p>
    <button class="btn" onclick="startGame()">开始游戏</button>
    <div class="controls">
        <p>← → 移动 | ↑ 旋转 | ↓ 加速 | 空格 硬降 | C 暂存</p>
        <p>触屏: 左右滑动移动 | 上滑旋转 | 下滑加速</p>
    </div>
</div>
<div id="gameOverScreen" class="overlay hidden">
    <h1>游戏结束</h1>
    <p>最终得分: <span id="finalScore">0</span></p>
    <button class="btn" onclick="startGame()">再来一局</button>
</div>
<div class="combo-display" id="comboDisplay"></div>
<div class="container">
    <div class="side-panel">
        <div class="panel-box" id="holdBox">
            <h3>Hold</h3>
            <canvas id="holdCanvas" width="80" height="80"></canvas>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div class="side-panel">
        <div class="panel-box">
            <h3>下一个</h3>
            <canvas id="nextCanvas" width="80" height="80"></canvas>
        </div>
        <div class="panel-box">
            <h3>分数</h3>
            <div class="value" id="score">0</div>
        </div>
        <div class="panel-box">
            <h3>等级</h3>
            <div class="value" id="level">1</div>
        </div>
        <div class="panel-box">
            <h3>消除行数</h3>
            <div class="value" id="lines">0</div>
        </div>
        <div class="panel-box highlight">
            <h3>连击</h3>
            <div class="value" id="combo">0</div>
        </div>
    </div>
</div>
<script>
var COLS = 10;
var ROWS = 20;
var BLOCK_SIZE = 22;
var canvas = document.getElementById('gameCanvas');
var ctx = canvas.getContext('2d');
canvas.width = COLS * BLOCK_SIZE;
canvas.height = ROWS * BLOCK_SIZE;
var nextCanvas = document.getElementById('nextCanvas');
var nextCtx = nextCanvas.getContext('2d');
var holdCanvas = document.getElementById('holdCanvas');
var holdCtx = holdCanvas.getContext('2d');
var board = [];
var currentPiece = null;
var nextPiece = null;
var heldPiece = null;
var canHold = true;
var score = 0;
var level = 1;
var lines = 0;
var combo = 0;
var gameLoop = null;
var dropCounter = 0;
var dropInterval = 1000;
var lastTime = 0;
var gameStarted = false;
var lockDelay = 0;
var lockDelayMax = 500;
var isLocking = false;
var particles = [];
var flashRows = [];
var bag = [];
var colors = {
    I: '#00f0f0',
    O: '#f0f000',
    T: '#a000f0',
    S: '#00f000',
    Z: '#f00000',
    J: '#0000f0',
    L: '#f0a000'
};
var pieces = [
    { type: 'I', shape: [[1,1,1,1]] },
    { type: 'O', shape: [[1,1],[1,1]] },
    { type: 'T', shape: [[0,1,0],[1,1,1]] },
    { type: 'S', shape: [[0,1,1],[1,1,0]] },
    { type: 'Z', shape: [[1,1,0],[0,1,1]] },
    { type: 'J', shape: [[1,0,0],[1,1,1]] },
    { type: 'L', shape: [[0,0,1],[1,1,1]] }
];
function shuffleBag() {
    bag = pieces.map(function(p) { return { type: p.type, shape: p.shape.map(function(r) { return r.slice(); })}; });
    for (var i = bag.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = bag[i];
        bag[i] = bag[j];
        bag[j] = tmp;
    }
}
function getNextFromBag() {
    if (bag.length === 0) shuffleBag();
    return bag.pop();
}
function createBoard() {
    board = [];
    for (var r = 0; r < ROWS; r++) {
        board[r] = [];
        for (var c = 0; c < COLS; c++) {
            board[r][c] = null;
        }
    }
}
function randomPiece() {
    var p = getNextFromBag();
    return {
        type: p.type,
        shape: p.shape.map(function(row) { return row.slice(); }),
        x: Math.floor(COLS / 2) - Math.floor(p.shape[0].length / 2),
        y: 0
    };
}
function valid(piece, offsetX, offsetY, newShape) {
    var shape = newShape || piece.shape;
    for (var r = 0; r < shape.length; r++) {
        for (var c = 0; c < shape[r].length; c++) {
            if (shape[r][c]) {
                var newX = piece.x + c + offsetX;
                var newY = piece.y + r + offsetY;
                if (newX < 0 || newX >= COLS || newY >= ROWS) {
                    return false;
                }
                if (newY >= 0 && board[newY][newX]) {
                    return false;
                }
            }
        }
    }
    return true;
}
function tryWallKick(piece, newShape) {
    var kicks = [[0,0],[-1,0],[1,0],[0,-1],[-2,0],[2,0]];
    for (var i = 0; i < kicks.length; i++) {
        if (valid(piece, kicks[i][0], kicks[i][1], newShape)) {
            piece.x += kicks[i][0];
            piece.y += kicks[i][1];
            piece.shape = newShape;
            return true;
        }
    }
    return false;
}
function rotate() {
    var newShape = [];
    var len = currentPiece.shape[0].length;
    for (var c = 0; c < len; c++) {
        newShape[c] = [];
        for (var r = currentPiece.shape.length - 1; r >= 0; r--) {
            newShape[c].push(currentPiece.shape[r][c]);
        }
    }
    if (tryWallKick(currentPiece, newShape)) {
        isLocking = false;
        lockDelay = 0;
    }
}
function merge() {
    for (var r = 0; r < currentPiece.shape.length; r++) {
        for (var c = 0; c < currentPiece.shape[r].length; c++) {
            if (currentPiece.shape[r][c]) {
                if (currentPiece.y + r < 0) {
                    gameOver();
                    return;
                }
                board[currentPiece.y + r][currentPiece.x + c] = currentPiece.type;
            }
        }
    }
}
function getGhostY() {
    var ghostY = currentPiece.y;
    while (valid(currentPiece, 0, ghostY - currentPiece.y + 1)) {
        ghostY++;
    }
    return ghostY;
}
function clearLines() {
    var cleared = [];
    for (var r = ROWS - 1; r >= 0; r--) {
        var full = true;
        for (var c = 0; c < COLS; c++) {
            if (!board[r][c]) {
                full = false;
                break;
            }
        }
        if (full) {
            cleared.push(r);
        }
    }
    if (cleared.length > 0) {
        for (var i = 0; i < cleared.length; i++) {
            createParticles(cleared[i]);
        }
        flashRows = cleared.slice();
        setTimeout(function() {
            flashRows = [];
        }, 200);
        for (var i = 0; i < cleared.length; i++) {
            board.splice(cleared[i], 1);
            board.unshift(new Array(COLS).fill(null));
        }
        var points = [0, 100, 300, 500, 800];
        var basePoints = points[cleared.length] || 800;
        combo++;
        var comboBonus = combo > 1 ? (combo - 1) * 50 : 0;
        score += basePoints + comboBonus;
        if (combo > 1) showCombo();
        lines += cleared.length;
        var newLevel = Math.floor(lines / 10) + 1;
        if (newLevel > level) {
            level = newLevel;
            dropInterval = Math.max(50, 1000 - (level - 1) * 100);
        }
        updateUI();
    } else {
        combo = 0;
        updateUI();
    }
}
function createParticles(row) {
    for (var c = 0; c < COLS; c++) {
        if (board[row][c]) {
            var color = colors[board[row][c]];
            for (var i = 0; i < 4; i++) {
                particles.push({
                    x: c * BLOCK_SIZE + BLOCK_SIZE / 2,
                    y: row * BLOCK_SIZE + BLOCK_SIZE / 2,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8 - 2,
                    color: color,
                    life: 1,
                    size: Math.random() * 4 + 2
                });
            }
        }
    }
}
function updateParticles(dt) {
    for (var i = particles.length - 1; i >= 0; i--) {
        var p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.3;
        p.life -= dt / 500;
        if (p.life <= 0) {
            particles.splice(i, 1);
        }
    }
}
function drawParticles() {
    for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
}
function showCombo() {
    var el = document.getElementById('comboDisplay');
    el.textContent = combo + ' COMBO';
    el.classList.add('show');
    setTimeout(function() {
        el.classList.remove('show');
    }, 800);
}
function drawBlock(x, y, type, alpha, glow) {
    if (alpha === undefined) alpha = 1;
    if (glow === undefined) glow = true;
    var color = colors[type];
    ctx.fillStyle = color;
    ctx.globalAlpha = alpha;
    ctx.fillRect(x * BLOCK_SIZE + 1, y * BLOCK_SIZE + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
    if (glow) {
        ctx.shadowColor = color;
        ctx.shadowBlur = 10;
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 1;
    ctx.strokeRect(x * BLOCK_SIZE + 2, y * BLOCK_SIZE + 2, BLOCK_SIZE - 4, BLOCK_SIZE - 4);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillRect(x * BLOCK_SIZE + 3, y * BLOCK_SIZE + 3, BLOCK_SIZE - 10, 3);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
}
function drawGhost() {
    if (!currentPiece) return;
    var ghostY = getGhostY();
    for (var r = 0; r < currentPiece.shape.length; r++) {
        for (var c = 0; c < currentPiece.shape[r].length; c++) {
            if (currentPiece.shape[r][c]) {
                var x = currentPiece.x + c;
                var y = ghostY + r;
                ctx.strokeStyle = colors[currentPiece.type];
                ctx.globalAlpha = 0.3;
                ctx.lineWidth = 2;
                ctx.strokeRect(x * BLOCK_SIZE + 2, y * BLOCK_SIZE + 2, BLOCK_SIZE - 4, BLOCK_SIZE - 4);
                ctx.globalAlpha = 1;
            }
        }
    }
}
function drawBoard() {
    ctx.fillStyle = '#0a0a18';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = 'rgba(80,80,120,0.15)';
    ctx.lineWidth = 0.5;
    for (var r = 0; r <= ROWS; r++) {
        ctx.beginPath();
        ctx.moveTo(0, r * BLOCK_SIZE);
        ctx.lineTo(canvas.width, r * BLOCK_SIZE);
        ctx.stroke();
    }
    for (var c = 0; c <= COLS; c++) {
        ctx.beginPath();
        ctx.moveTo(c * BLOCK_SIZE, 0);
        ctx.lineTo(c * BLOCK_SIZE, canvas.height);
        ctx.stroke();
    }
    for (var r = 0; r < ROWS; r++) {
        for (var c = 0; c < COLS; c++) {
            if (board[r][c]) {
                if (flashRows.indexOf(r) >= 0) {
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(c * BLOCK_SIZE + 1, r * BLOCK_SIZE + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
                } else {
                    drawBlock(c, r, board[r][c]);
                }
            }
        }
    }
    drawParticles();
}
function drawPiece() {
    if (!currentPiece) return;
    for (var r = 0; r < currentPiece.shape.length; r++) {
        for (var c = 0; c < currentPiece.shape[r].length; c++) {
            if (currentPiece.shape[r][c]) {
                drawBlock(currentPiece.x + c, currentPiece.y + r, currentPiece.type);
            }
        }
    }
}
function drawPreview(canvasEl, ctxEl, piece) {
    ctxEl.fillStyle = '#0a0a15';
    ctxEl.fillRect(0, 0, canvasEl.width, canvasEl.height);
    if (!piece) return;
    var shape = piece.shape;
    var blockSize = 18;
    var offsetX = (canvasEl.width - shape[0].length * blockSize) / 2;
    var offsetY = (canvasEl.height - shape.length * blockSize) / 2;
    for (var r = 0; r < shape.length; r++) {
        for (var c = 0; c < shape[r].length; c++) {
            if (shape[r][c]) {
                var x = offsetX / blockSize + c;
                var y = offsetY / blockSize + r;
                ctxEl.fillStyle = colors[piece.type];
                ctxEl.fillRect(x * blockSize + 1, y * blockSize + 1, blockSize - 2, blockSize - 2);
                ctxEl.strokeStyle = 'rgba(255,255,255,0.5)';
                ctxEl.strokeRect(x * blockSize + 2, y * blockSize + 2, blockSize - 4, blockSize - 4);
            }
        }
    }
}
function updateUI() {
    document.getElementById('score').textContent = score;
    document.getElementById('level').textContent = level;
    document.getElementById('lines').textContent = lines;
    document.getElementById('combo').textContent = combo;
    var holdBox = document.getElementById('holdBox');
    if (canHold) {
        holdBox.style.opacity = '1';
    } else {
        holdBox.style.opacity = '0.5';
    }
}
function spawn() {
    currentPiece = nextPiece || randomPiece();
    nextPiece = randomPiece();
    drawPreview(nextCanvas, nextCtx, nextPiece);
    canHold = true;
    isLocking = false;
    lockDelay = 0;
    if (!valid(currentPiece, 0, 0)) {
        gameOver();
    }
}
function drop() {
    if (!valid(currentPiece, 0, 1)) {
        if (!isLocking) {
            isLocking = true;
            lockDelay = 0;
        }
        return false;
    }
    currentPiece.y++;
    isLocking = false;
    lockDelay = 0;
    return true;
}
function lock() {
    merge();
    clearLines();
    spawn();
}
function hardDrop() {
    while (valid(currentPiece, 0, 1)) {
        currentPiece.y++;
        score += 2;
    }
    lock();
    updateUI();
}
function move(dir) {
    if (valid(currentPiece, dir, 0)) {
        currentPiece.x += dir;
        if (isLocking) lockDelay = 0;
    }
}
function hold() {
    if (!canHold || !currentPiece) return;
    canHold = false;
    var type = currentPiece.type;
    var shape = currentPiece.shape;
    if (heldPiece) {
        currentPiece = {
            type: heldPiece.type,
            shape: heldPiece.shape.map(function(r) { return r.slice(); }),
            x: Math.floor(COLS / 2) - Math.floor(heldPiece.shape[0].length / 2),
            y: 0
        };
    } else {
        spawn();
    }
    heldPiece = { type: type, shape: shape };
    drawPreview(holdCanvas, holdCtx, heldPiece);
    isLocking = false;
    lockDelay = 0;
}
function gameOver() {
    gameStarted = false;
    cancelAnimationFrame(gameLoop);
    document.getElementById('finalScore').textContent = score;
    document.getElementById('gameOverScreen').classList.remove('hidden');
}
function update(time) {
    if (!gameStarted) return;
    var dt = time - lastTime;
    lastTime = time;
    dropCounter += dt;
    if (dropCounter > dropInterval) {
        drop();
        dropCounter = 0;
    }
    if (isLocking) {
        lockDelay += dt;
        if (lockDelay >= lockDelayMax) {
            lock();
        }
    }
    updateParticles(dt);
    drawBoard();
    drawGhost();
    drawPiece();
    gameLoop = requestAnimationFrame(update);
}
function startGame() {
    createBoard();
    score = 0;
    level = 1;
    lines = 0;
    combo = 0;
    dropInterval = 1000;
    dropCounter = 0;
    particles = [];
    flashRows = [];
    nextPiece = null;
    heldPiece = null;
    canHold = true;
    isLocking = false;
    lockDelay = 0;
    shuffleBag();
    updateUI();
    drawPreview(holdCanvas, holdCtx, null);
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    spawn();
    gameStarted = true;
    lastTime = performance.now();
    gameLoop = requestAnimationFrame(update);
}
var touchStartX = 0;
var touchStartY = 0;
var touchStartTime = 0;
canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (!gameStarted) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchStartTime = Date.now();
}, { passive: false });
canvas.addEventListener('touchend', function(e) {
    e.preventDefault();
    if (!gameStarted) return;
    var touchEndX = e.changedTouches[0].clientX;
    var touchEndY = e.changedTouches[0].clientY;
    var dx = touchEndX - touchStartX;
    var dy = touchEndY - touchStartY;
    var dt = Date.now() - touchStartTime;
    if (dt < 200 && Math.abs(dx) < 20 && Math.abs(dy) < 20) {
        rotate();
    } else if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 30) move(1);
        else if (dx < -30) move(-1);
    } else {
        if (dy > 30) drop();
    }
}, { passive: false });
document.addEventListener('keydown', function(e) {
    if (!gameStarted) return;
    switch(e.key) {
        case 'ArrowLeft':
            e.preventDefault();
            move(-1);
            break;
        case 'ArrowRight':
            e.preventDefault();
            move(1);
            break;
        case 'ArrowDown':
            e.preventDefault();
            if (drop()) score += 1;
            updateUI();
            break;
        case 'ArrowUp':
            e.preventDefault();
            rotate();
            break;
        case ' ':
            e.preventDefault();
            hardDrop();
            break;
        case 'c':
        case 'C':
            hold();
            break;
    }
});
</script>
</body>
</html>
