<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#FF6B35">
  <title>今天吃什么</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --primary: #FF6B35;
      --primary-dark: #E55A2B;
      --primary-light: #FF8F5E;
      --accent: #E84233;
      --accent-light: #FF6B5E;
      --bg: #FFF8F0;
      --bg-warm: #FFF1E6;
      --card: #FFFFFF;
      --text: #2D2D2D;
      --text-light: #888888;
      --text-lighter: #BBBBBB;
      --shadow: rgba(255,107,53,0.12);
      --shadow-strong: rgba(255,107,53,0.25);
      --border: #F0E6DC;
      --success: #4CAF50;
      --danger: #E84233;
      --tag-bg: #FFF1E6;
      --tag-active: #FF6B35;
      --meal-breakfast: #FFB347;
      --meal-lunch: #FF6B35;
      --meal-tea: #FF8FAB;
      --meal-dinner: #E84233;
      --meal-supper: #7B68EE;
      --cat-soup: #4CAF50;
      --cat-staple: #FF9800;
      --cat-dish: #F44336;
      --cat-dessert: #E91E63;
      --cat-fruit: #8BC34A;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html{font-size:16px;scroll-behavior:smooth}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

    /* ===== Step Indicator ===== */
    .step-indicator{position:fixed;top:0;left:0;right:0;z-index:200;background:linear-gradient(135deg,var(--primary),var(--accent));padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:0;color:#fff;box-shadow:0 2px 12px var(--shadow-strong);transition:opacity .3s}
    .step-indicator.hidden{opacity:0;pointer-events:none}
    .step-dot{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;transition:all .3s}
    .step-dot.active{background:#fff;color:var(--primary);transform:scale(1.15);box-shadow:0 2px 8px rgba(0,0,0,.2)}
    .step-dot.done{background:rgba(255,255,255,.7);color:var(--primary)}
    .step-line{width:36px;height:2px;background:rgba(255,255,255,.3);transition:background .3s}
    .step-line.done{background:rgba(255,255,255,.7)}

    /* ===== Step Pages ===== */
    .step-page{position:fixed;inset:0;z-index:100;background:var(--bg);display:none;flex-direction:column;overflow-y:auto;padding-top:52px;transition:transform .4s cubic-bezier(.4,0,.2,1),opacity .4s}
    .step-page.active{display:flex}
    .step-page.slide-in-right{display:flex;animation:slideInRight .4s ease forwards}
    .step-page.slide-out-left{display:flex;animation:slideOutLeft .4s ease forwards}
    .step-page.slide-in-left{display:flex;animation:slideInLeft .4s ease forwards}
    .step-page.slide-out-right{display:flex;animation:slideOutRight .4s ease forwards}
    @keyframes slideInRight{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
    @keyframes slideOutLeft{from{transform:translateX(0);opacity:1}to{transform:translateX(-30%);opacity:0}}
    @keyframes slideInLeft{from{transform:translateX(-30%);opacity:0}to{transform:translateX(0);opacity:1}}
    @keyframes slideOutRight{from{transform:translateX(0);opacity:1}to{transform:translateX(100%);opacity:0}}

    /* ===== Step 1: Meal + People ===== */
    .step1-content{flex:1;display:flex;flex-direction:column;align-items:center;padding:20px 16px 32px}
    .step1-title{font-size:1.6rem;font-weight:800;margin-bottom:6px;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .step1-subtitle{font-size:.9rem;color:var(--text-light);margin-bottom:24px}
    .meal-section{width:100%;max-width:400px;margin-bottom:24px}
    .meal-section-label{font-size:.85rem;color:var(--text-light);margin-bottom:10px;text-align:center}
    .meal-cards{display:flex;gap:8px;overflow-x:auto;padding:4px 0;-webkit-overflow-scrolling:touch}
    .meal-card2{flex:0 0 auto;min-width:62px;padding:10px 6px;border-radius:14px;text-align:center;cursor:pointer;background:var(--tag-bg);border:2px solid transparent;transition:all .3s;user-select:none}
    .meal-card2.active{border-color:var(--primary);background:linear-gradient(135deg,var(--primary-light),var(--primary));color:#fff;transform:scale(1.08);box-shadow:0 4px 14px var(--shadow-strong)}
    .meal-card2 .mc-emoji{font-size:1.4rem;margin-bottom:2px}
    .meal-card2 .mc-name{font-size:.75rem;font-weight:600}
    .meal-card2:not(.active):active{transform:scale(.95)}

    .people-section{width:100%;max-width:400px;margin-bottom:24px}
    .people-section-label{font-size:.85rem;color:var(--text-light);margin-bottom:10px;text-align:center}
    .stick-figures-area{display:flex;align-items:flex-end;justify-content:center;min-height:70px;gap:6px;flex-wrap:wrap;margin-bottom:8px;padding:8px 4px}
    .stick-figure{display:inline-flex;flex-direction:column;align-items:center;margin:0 2px;transition:all .4s}
    .stick-figure.walk-in{animation:walkIn .5s ease-out forwards}
    .stick-figure.walk-out{animation:walkOut .5s ease-in forwards}
    @keyframes walkIn{0%{transform:translateX(50px);opacity:0}50%{transform:translateX(-4px);opacity:1}100%{transform:translateX(0);opacity:1}}
    @keyframes walkOut{0%{transform:translateX(0);opacity:1}50%{transform:translateX(4px);opacity:1}100%{transform:translateX(-50px);opacity:0;height:0;margin:0;padding:0;overflow:hidden}}
    .sf-head{width:16px;height:16px;border:2.5px solid var(--primary);border-radius:50%;background:#FFF1E6;position:relative}
    .sf-head::after{content:'‿';position:absolute;top:4px;left:50%;transform:translateX(-50%);font-size:7px;color:var(--primary);line-height:1}
    .sf-body{width:2.5px;height:14px;background:var(--primary);margin:0 auto}
    .sf-arms{width:20px;height:2.5px;background:var(--primary);margin:-10px auto 0;border-radius:2px}
    .sf-legs{display:flex;gap:8px;margin-top:-1px}
    .sf-leg{width:2.5px;height:10px;background:var(--primary);border-radius:0 0 1px 1px}
    .sf-leg:first-child{transform:rotate(8deg)}
    .sf-leg:last-child{transform:rotate(-8deg)}
    .sf-colors .sf-head{border-color:var(--c)}
    .sf-colors .sf-body,.sf-colors .sf-arms,.sf-colors .sf-leg{background:var(--c)}
    .sf-colors .sf-head::after{color:var(--c)}
    .sf-bounce{animation:bounce 2s ease-in-out infinite}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

    .people-controls{display:flex;align-items:center;justify-content:center;gap:16px}
    .people-btn{width:40px;height:40px;border-radius:50%;border:2.5px solid var(--primary);background:#fff;color:var(--primary);font-size:1.3rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .people-btn:active{background:var(--primary);color:#fff;transform:scale(.92)}
    .people-btn:disabled{border-color:var(--text-lighter);color:var(--text-lighter);cursor:not-allowed}
    .people-count-display{font-size:1.1rem;font-weight:700;color:var(--primary)}

    .next-step-btn{display:flex;align-items:center;gap:8px;padding:14px 48px;border:none;border-radius:28px;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;font-size:1.05rem;font-weight:700;cursor:pointer;box-shadow:0 4px 20px var(--shadow-strong);transition:all .3s;letter-spacing:1px;margin-top:auto}
    .next-step-btn:active{transform:scale(.96)}
    .next-step-btn:disabled{opacity:.5;cursor:not-allowed}

    /* ===== Step 2: Cook or Takeout ===== */
    .step2-content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 16px;gap:20px;position:relative}
    .step2-title{font-size:1.3rem;font-weight:700;color:var(--text);margin-bottom:8px}
    .choice-cards{display:flex;gap:16px;width:100%;max-width:400px}
    .choice-card{flex:1;padding:28px 16px;border-radius:20px;background:var(--card);border:2.5px solid var(--border);cursor:pointer;text-align:center;transition:all .3s;box-shadow:0 2px 10px var(--shadow)}
    .choice-card:active{transform:scale(.96)}
    .choice-card:hover{border-color:var(--primary);box-shadow:0 4px 20px var(--shadow-strong)}
    .choice-card .cc-emoji{font-size:3rem;margin-bottom:8px}
    .choice-card .cc-title{font-size:1.1rem;font-weight:700;margin-bottom:4px}
    .choice-card .cc-desc{font-size:.78rem;color:var(--text-light)}

    /* ===== Step 3: Ingredients ===== */
    .step3-content{flex:1;display:flex;flex-direction:column;align-items:center;padding:20px 16px;position:relative}
    .step3-title{font-size:1.3rem;font-weight:700;margin-bottom:20px}
    .ingredient-choice{display:flex;gap:12px;margin-bottom:20px}
    .ing-choice-btn{padding:12px 24px;border-radius:18px;background:var(--tag-bg);border:2px solid var(--border);font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s}
    .ing-choice-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .ing-choice-btn:active{transform:scale(.96)}
    .ingredient-wall{width:100%;max-width:400px;max-height:0;overflow:hidden;transition:max-height .4s ease}
    .ingredient-wall.open{max-height:800px}
    .ingredient-search{margin-bottom:10px;position:relative}
    .ingredient-search input{width:100%;padding:8px 12px 8px 32px;border:1px solid var(--border);border-radius:10px;font-size:.85rem;outline:none;background:var(--bg)}
    .ingredient-search input:focus{border-color:var(--primary)}
    .ingredient-search::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:.85rem}
    .ingredient-groups{padding:0 0 12px}
    .ingredient-group{margin-bottom:8px}
    .ingredient-group-title{font-size:.75rem;color:var(--text-light);margin-bottom:6px;font-weight:600;letter-spacing:.5px}
    .ingredient-tags{display:flex;flex-wrap:wrap;gap:6px}
    .ingredient-tag{padding:5px 12px;border-radius:16px;background:var(--tag-bg);border:1.5px solid var(--border);font-size:.78rem;cursor:pointer;transition:all .2s;user-select:none;color:var(--text)}
    .ingredient-tag:active{transform:scale(.95)}
    .ingredient-tag.selected{background:var(--tag-active);color:#fff;border-color:var(--tag-active)}
    .ingredient-tag.hidden{display:none}
    .step3-next{margin-top:auto;padding-top:16px}

    /* ===== Step 4: Recommendations ===== */
    #stepPage4{padding-top:0!important}
    .step4-header{position:sticky;top:0;z-index:90;background:linear-gradient(135deg,var(--primary),var(--accent));padding:10px 16px;display:flex;align-items:center;justify-content:space-between;color:#fff;box-shadow:0 2px 12px var(--shadow-strong)}
    .step4-header-left{display:flex;align-items:center;gap:8px}
    .refresh-all-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;padding:4px 12px;border-radius:14px;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
    .refresh-all-btn:active{background:rgba(255,255,255,.35);transform:scale(.95)}
    .step4-header h1{font-size:1.1rem;font-weight:700}
    .step4-header-btns{display:flex;gap:10px}
    .h4-btn{background:rgba(255,255,255,.2);border:none;color:#fff;width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:background .2s}
    .h4-btn:hover{background:rgba(255,255,255,.35)}
    .h4-btn:active{transform:scale(.92)}

    .rec-content{padding:12px;padding-bottom:80px}
    .category-grid{display:grid;gap:12px}
    .category-grid.cols-2{grid-template-columns:1fr 1fr}
    .category-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
    @media(max-width:420px){.category-grid.cols-3{grid-template-columns:1fr 1fr}}

    .cat-card{background:var(--card);border-radius:16px;box-shadow:0 2px 12px var(--shadow);overflow:hidden;transition:all .3s;position:relative}
    .cat-card.disabled{opacity:.45;filter:grayscale(.6)}
    .cat-card-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px 6px;position:relative}
    .cat-card-title{display:flex;align-items:center;gap:6px;font-size:.95rem;font-weight:700}
    .cat-card-title .cat-icon{font-size:1.1rem}
    .cat-toggle{width:28px;height:28px;border-radius:50%;border:2.5px solid #ccc;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff;transition:all .3s}
    .cat-toggle.on{background:var(--success);border-color:var(--success)}
    .cat-toggle.off{background:var(--danger);border-color:var(--danger)}

    .cat-card-body{padding:0 12px 8px}
    .dish-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);position:relative}
    .dish-item:last-child{border-bottom:none}
    .dish-item-img{width:56px;height:56px;border-radius:10px;overflow:hidden;flex-shrink:0;cursor:pointer;position:relative;background:var(--tag-bg)}
    .dish-item-img img{width:100%;height:100%;object-fit:cover;display:block}
    .dish-item-img .img-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:1.5rem}
    .dish-item-info{flex:1;min-width:0}
    .dish-item-name{font-size:.85rem;font-weight:700;line-height:1.3;cursor:pointer}
    .dish-item-name:hover{color:var(--primary)}
    .dish-item-meta{display:flex;flex-direction:column;gap:1px;margin-top:2px}
    .dish-item-meta span{font-size:.65rem;color:var(--text-light);line-height:1.3}
    .dish-item-tags{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
    .dish-tag-s{font-size:.58rem;padding:1px 5px;border-radius:6px;background:var(--tag-bg);color:var(--primary)}
    .dish-delete{position:absolute;top:6px;right:0;width:18px;height:18px;border-radius:50%;background:transparent;border:none;color:var(--text-lighter);font-size:.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;opacity:0;z-index:5}
    .dish-item:hover .dish-delete,.dish-delete.show{opacity:1}
    .dish-delete:hover{background:var(--danger);color:#fff;opacity:1}

    .cat-card-footer{padding:6px 12px 10px;display:flex;gap:8px;justify-content:center}
    .refresh-cat-btn{background:none;border:1.5px solid var(--border);border-radius:12px;padding:5px 16px;font-size:.78rem;color:var(--text-light);cursor:pointer;transition:all .2s}
    .refresh-cat-btn:active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .add-dish-btn{background:none;border:1.5px solid var(--primary);border-radius:12px;padding:5px 16px;font-size:.78rem;color:var(--primary);cursor:pointer;transition:all .2s}
    .add-dish-btn:active{background:var(--primary);color:#fff}

    /* ===== Nutrition Overview ===== */
    .nutrition-bar{margin:16px 0 8px;padding:14px 16px;background:var(--card);border-radius:14px;box-shadow:0 2px 8px var(--shadow)}
    .nutrition-title{font-size:.85rem;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
    .nutri-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .nutri-row:last-child{margin-bottom:0}
    .nutri-label{font-size:.72rem;color:var(--text-light);width:42px;flex-shrink:0}
    .nutri-bars{flex:1;display:flex;flex-direction:column;gap:3px}
    .nutri-bar-line{display:flex;align-items:center;gap:4px;position:relative}
    .nutri-bar-hint{font-size:.5rem;color:var(--text-lighter);width:24px;flex-shrink:0;text-align:right}
    .nutri-bar-bg{flex:1;height:7px;background:var(--tag-bg);border-radius:4px;overflow:visible;position:relative}
    .nutri-meal-line{position:absolute;top:-4px;bottom:-4px;width:2px;background:repeating-linear-gradient(to bottom,var(--primary) 2px,transparent 2px,transparent 4px);z-index:2;pointer-events:none;opacity:.7}
    .nutri-meal-label{position:absolute;top:-12px;transform:translateX(-50%);font-size:.48rem;color:var(--primary);white-space:nowrap;pointer-events:none;font-weight:600}
    .nutri-bar-fill{height:100%;border-radius:4px;transition:width .5s ease;position:relative}
    .nutri-bar-daily-fill{background:linear-gradient(90deg,#ccc,#ddd)!important;opacity:.5}
    .nutri-val{display:flex;flex-direction:column;gap:1px;width:110px;text-align:right;flex-shrink:0}
    .nutri-val-meal{font-size:.72rem;font-weight:600;line-height:1.2}
    .nutri-val-daily{font-size:.62rem;color:var(--text-lighter);line-height:1.2}
    .nutri-meal-ok{color:#4CAF50}.nutri-meal-low{color:#FF9800}.nutri-meal-over{color:#E84233}
    .nutri-protein .nutri-bar-fill:not(.nutri-bar-daily-fill){background:linear-gradient(90deg,#4CAF50,#66BB6A)}
    .nutri-carbs .nutri-bar-fill:not(.nutri-bar-daily-fill){background:linear-gradient(90deg,#FF9800,#FFB74D)}
    .nutri-fat .nutri-bar-fill:not(.nutri-bar-daily-fill){background:linear-gradient(90deg,#F44336,#EF5350)}

    /* ===== Shopping List ===== */
    .shopping-list{margin:0 0 10px;padding:12px 14px;background:var(--card);border-radius:14px;box-shadow:0 2px 8px var(--shadow)}
    .shopping-title{font-size:.82rem;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
    .shopping-tags{display:flex;flex-wrap:wrap;gap:6px}
    .shop-tag{display:inline-flex;align-items:center;gap:3px;padding:4px 10px;border-radius:12px;background:var(--tag-bg);border:1px solid var(--border);font-size:.72rem;color:var(--text);transition:all .2s}
    .shop-tag .shop-count{color:var(--primary);font-weight:700;font-size:.68rem}
    .shop-tag-x{width:16px;height:16px;border-radius:50%;background:transparent;border:none;color:var(--text-lighter);font-size:.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;padding:0;flex-shrink:0}
    .shop-tag-x:hover{background:var(--danger);color:#fff}

    /* ===== Ingredient Action Modal ===== */
    .ing-action-modal{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.5);display:none;align-items:flex-end;justify-content:center}
    .ing-action-modal.show{display:flex}
    .ing-action-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px 16px 32px;animation:slideUp .3s ease}
    .ing-action-title{font-size:1rem;font-weight:700;text-align:center;margin-bottom:16px;color:var(--text)}
    .ing-action-options{display:flex;flex-direction:column;gap:10px}
    .ing-action-option{padding:12px 16px;border-radius:12px;background:var(--tag-bg);border:1.5px solid var(--border);font-size:.88rem;cursor:pointer;transition:all .2s;text-align:center}
    .ing-action-option:active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .ing-action-option.danger{color:var(--danger);border-color:rgba(232,66,51,.3)}
    .ing-action-option.danger:active{background:var(--danger);color:#fff}
    .ing-action-skip{margin-top:10px;text-align:center;color:var(--text-lighter);font-size:.85rem;cursor:pointer;padding:8px}

    /* ===== Nutrition Adjuster ===== */
    .nutrition-adjust-btn{display:flex;align-items:center;gap:6px;margin-top:10px;padding:7px 14px;border-radius:10px;background:var(--tag-bg);border:1.5px solid var(--border);font-size:.78rem;color:var(--text-light);cursor:pointer;transition:all .2s}
    .nutrition-adjust-btn:hover{border-color:var(--primary);color:var(--primary)}
    .nutrition-adjust-btn:active{transform:scale(.96)}
    .nutrition-adjust-panel{margin-top:8px;padding:14px;background:var(--card);border-radius:14px;box-shadow:0 2px 8px var(--shadow);display:none;border:1px solid var(--border)}
    .nutrition-adjust-panel.open{display:block;animation:fadeIn .3s ease}
    .nap-title{font-size:.82rem;font-weight:700;margin-bottom:10px;color:var(--text)}
    .nap-presets{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
    .nap-preset{padding:5px 12px;border-radius:12px;background:var(--tag-bg);border:1.5px solid var(--border);font-size:.72rem;cursor:pointer;transition:all .2s;white-space:nowrap}
    .nap-preset:hover{border-color:var(--primary)}
    .nap-preset.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .nap-slider-group{margin-bottom:10px}
    .nap-slider-group:last-child{margin-bottom:0}
    .nap-slider-label{display:flex;justify-content:space-between;align-items:center;font-size:.75rem;color:var(--text-light);margin-bottom:4px}
    .nap-slider-label span:last-child{font-weight:600;color:var(--text)}
    .nap-slider{width:100%;height:6px;-webkit-appearance:none;appearance:none;background:var(--tag-bg);border-radius:3px;outline:none}
    .nap-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--primary);cursor:pointer;box-shadow:0 1px 4px var(--shadow-strong)}
    .nap-slider::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--primary);cursor:pointer;border:none}

    /* ===== Sidebar ===== */
    .sidebar-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.4);display:none;opacity:0;transition:opacity .3s}
    .sidebar-overlay.show{display:block;opacity:1}

// ========== Dynamic Dish Count ==========
function getDefaultDishCount(cat, people) {
  switch(cat) {
    case 'staple': return people <= 2 ? 1 : 2;
    case 'soup':   return 1;
    case 'dish':   return people === 1 ? 2 : people === 2 ? 2 : people === 3 ? 3 : 4;
    case 'dessert':return people <= 2 ? 1 : 2;
    case 'fruit':  return 1;
    default:       return 2;
  }
}
function getDishCount(cat, people) {
  const pref = state.quantityPreference[cat];
  if (pref && pref[people] !== undefined) return pref[people];
  return getDefaultDishCount(cat, people);
}
function hasUserPreference(cat, people) {
  const pref = state.quantityPreference[cat];
  return pref && pref[people] !== undefined;
}

// ========== Quantity Preference Learning ==========
function loadQuantityPreference(){try{state.quantityPreference=JSON.parse(localStorage.getItem('fa_quantity_preference'))||{}}catch(e){state.quantityPreference={}}}
function saveQuantityPreference(){localStorage.setItem('fa_quantity_preference',JSON.stringify(state.quantityPreference))}
function recordInitialRecommendation(cat,count){if(!state._initialRecCounts)state._initialRecCounts={};state._initialRecCounts[cat]=count}
function learnFromCurrentRecommendations(){
  const people=state.dinerCount;
  Object.keys(state.currentRecommendations).forEach(cat=>{
    const initial=state._initialRecCounts[cat];
    const current=(state.currentRecommendations[cat]||[]).length;
    if(initial!==undefined&&current<initial){
      if(!state.quantityPreference[cat])state.quantityPreference[cat]={};
      state.quantityPreference[cat][people]=current;
      saveQuantityPreference();
    }
  });
}

// ========== Step Navigation ==========
function goToStep(step){
  const prev=state.currentStep;const prevEl=$('#stepPage'+prev);const nextEl=$('#stepPage'+step);const fwd=step>prev;
  prevEl.classList.remove('active','slide-in-right','slide-out-left','slide-in-left','slide-out-right');
  nextEl.classList.remove('active','slide-in-right','slide-out-left','slide-in-left','slide-out-right');
  if(fwd){prevEl.classList.add('slide-out-left');nextEl.classList.add('slide-in-right')}
  else{prevEl.classList.add('slide-out-right');nextEl.classList.add('slide-in-left')}
  setTimeout(()=>{prevEl.classList.remove('slide-out-left','slide-out-right');prevEl.style.display='none';nextEl.classList.remove('slide-in-right','slide-in-left');nextEl.style.display='';nextEl.classList.add('active');state.currentStep=step},400);
  updateStepIndicator(step);
  if(step===4){$('#stepIndicator').classList.add('hidden');runRecommendation()}else{$('#stepIndicator').classList.remove('hidden')}
}
function updateStepIndicator(step){$$('.step-dot').forEach(d=>{const s=parseInt(d.dataset.step);d.classList.toggle('active',s===step);d.classList.toggle('done',s<step)});for(let i=1;i<=3;i++){const l=$('#line'+i);l.classList.toggle('done',i<step)}}

// ========== Recommendation ==========
function runRecommendation(){state.previousDinerCount=state.dinerCount;const recs=getRecommendations();state.currentRecommendations=recs;renderResults(recs);renderNutritionOverview(recs);state.recommendCount++;if(state.recommendCount%10===0){const cd=getComfortZone();if(cd){state.comfortZoneDish=cd;$('#comfortDishName').textContent=cd.name+' — 跳出舒适区';$('#comfortBanner').classList.add('show')}}saveState()}
function getRecommendations(){
  const meal=state.currentMeal;const people=state.dinerCount;const ing=state.selectedIngredients;const rest=state.dietaryRestrictions;
  const cats=MEAL_CATS[meal]||[];state._initialRecCounts={};
  const totalTargets=getNutritionTargets();
  const mealRatio=getMealNutritionRatio();
  const mealTargets={protein:totalTargets.protein*mealRatio,carbs:totalTargets.carbs*mealRatio,fat:totalTargets.fat*mealRatio};
  const result={};
  // Build nutrition context: gap = meal target (daily × ratio) for initial rec
  const nutriCtx={isLow:true,gap:{protein:mealTargets.protein,carbs:mealTargets.carbs,fat:mealTargets.fat}};
  cats.forEach(cat=>{if(!state.categoryEnabled[cat]){result[cat]=[];return}
    const dishCount=(state._recCountOverride&&state._recCountOverride[cat])||getDishCount(cat,people);recordInitialRecommendation(cat,dishCount);
    let pool;if(cat==='dish'){pool=DISHES.filter(d=>d.meals.includes(meal)&&(d.cat==='meat'||d.cat==='veg'))}else{pool=DISHES.filter(d=>d.meals.includes(meal)&&d.cat===cat)}
    pool=pool.filter(d=>people>=d.people[0]&&people<=d.people[1]);pool=filterRestrictions(pool,rest);
    // Filter by tempExcludeIngredients
    if(state.tempExcludeIngredients.length>0){pool=pool.filter(d=>!d.ingredients.some(i=>state.tempExcludeIngredients.some(ei=>i.includes(ei)||ei.includes(i))))}
    // Relaxed ingredient matching: full match +10, partial +5, no match +0
    if(ing.length>0){
      pool=pool.map(d=>{
        const matchCount=d.ingredients.filter(i=>ing.some(si=>i.includes(si)||si.includes(i))).length;
        let _match=0;
        if(matchCount===d.ingredients.length)_match=10;       // full match
        else if(matchCount>0)_match=5;                         // partial match
        else _match=0;                                          // no match but same meal, still allowed
        return{...d,_match,_matchCount:matchCount};
      });
      // Sort: full match > partial > none, then by match count for tie-breaking
      pool.sort((a,b)=>b._match-a._match||b._matchCount-a._matchCount);
    }
    pool=sortTaste(pool,nutriCtx);
    // Combine taste+nutrition scores with randomness for variety
    pool.sort((a,b)=>{const aS=(a._ts||0)+(a._ns||0)+(a._match||0)*3+(Math.random()-.5)*2;const bS=(b._ts||0)+(b._ns||0)+(b._match||0)*3+(Math.random()-.5)*2;return bS-aS});
    result[cat]=pool.slice(0,Math.min(dishCount,pool.length));
  });return result}
function filterRestrictions(dishes,rest){if(!rest||!rest.length)return dishes;return dishes.filter(d=>{for(const r of rest){if(r==='不吃辣'&&d.tags.includes('辣'))return false;if(r==='不吃海鲜'&&d.ingredients.some(i=>['鱼','虾','鱿鱼','小龙虾','大虾','鲫鱼','鲈鱼','草鱼','花蛤','鱼头','虾仁'].includes(i)))return false;if(r==='不吃牛羊肉'&&d.ingredients.some(i=>['牛肉','羊肉','牛腩'].includes(i)))return false;if(r==='不吃猪肉'&&d.ingredients.some(i=>['猪肉','五花肉','排骨','猪里脊','肉末','培根','香肠','猪肝'].includes(i)))return false;if(r==='不吃葱蒜'&&d.ingredients.some(i=>['葱','蒜','小葱','蒜苗'].includes(i)))return false;if(r==='不吃香菜'&&d.ingredients.includes('香菜'))return false;if(r==='不吃豆制品'&&d.ingredients.some(i=>['豆腐','豆皮','腐竹','豆干'].includes(i)))return false;if(r==='不吃乳制品'&&d.ingredients.some(i=>['牛奶','酸奶','芝士','奶油'].includes(i)))return false;if(r==='不吃鸡蛋'&&d.ingredients.some(i=>['鸡蛋','皮蛋','蛋清'].includes(i)))return false;if(!PRESET_RESTRICTIONS.includes(r)){const k=r.replace('不吃','');if(d.ingredients.some(i=>i.includes(k)||k.includes(i))||d.name.includes(k))return false}}return true})}
function sortTaste(pool,nutriCtx){
  const ts={};
  if(state.tasteHistory.length)state.tasteHistory.forEach(h=>{h.tags.forEach(t=>{ts[t]=(ts[t]||0)+(h.action==='accept'?2:-1)})});
  const dailyTargets=getDailyTargets();
  const stdP=75,stdC=250,stdF=60;
  const wP=dailyTargets.protein/stdP,wC=dailyTargets.carbs/stdC,wF=dailyTargets.fat/stdF;
  const mealRatio=getMealNutritionRatio();
  const mealTargets={protein:dailyTargets.protein*mealRatio*state.dinerCount,carbs:dailyTargets.carbs*mealRatio*state.dinerCount,fat:dailyTargets.fat*mealRatio*state.dinerCount};
  const NW=20; // nutrition weight coefficient
  return pool.map(d=>{
    let _ts=0;
    if(state.tasteHistory.length)_ts=d.tags.reduce((s,t)=>s+(ts[t]||0),0);
    let _ns=0;
    if(nutriCtx){
      const ratio=state.dinerCount/(d.servings||2);
      const dp=(d.protein||0)*ratio,dc=(d.carbs||0)*ratio,df=(d.fat||0)*ratio;
      // Gap-fill reward (when still below target)
      if(nutriCtx.isLow){
        const g=nutriCtx.gap;
        _ns+=((g.protein>0?dp/g.protein:0)*wP+(g.carbs>0?dc/g.carbs:0)*wC+(g.fat>0?df/g.fat:0)*wF)*NW;
      }
      // Mode-specific penalty/reward: nutrition preference >> random factor
      // Low fat mode: penalize fat-heavy dishes
      if(wF<0.7){
        _ns-=(df/(mealTargets.fat||1))*NW*2;
      }
      // Low carb mode: penalize carb-heavy dishes
      if(wC<0.5){
        _ns-=(dc/(mealTargets.carbs||1))*NW*2;
      }
      // High protein mode: reward protein-heavy dishes
      if(wP>1.5){
        _ns+=(dp/(mealTargets.protein||1))*NW*2;
      }
      // Penalize any macro that overshoots its meal target heavily
      const pOver=dp/(mealTargets.protein||1),cOver=dc/(mealTargets.carbs||1),fOver=df/(mealTargets.fat||1);
      if(pOver>1)_ns-=(pOver-1)*NW;
      if(cOver>1)_ns-=(cOver-1)*NW;
      if(fOver>1)_ns-=(fOver-1)*NW;
    }
    return{...d,_ts,_ns};
  }).sort((a,b)=>(b._ts+b._ns)-(a._ts+a._ns));
}
function shufflePick(arr,n){const s=[...arr].sort(()=>Math.random()-.5);return s.slice(0,Math.min(n,s.length))}
function getComfortZone(){if(state.tasteHistory.length<3)return null;const ts={};state.tasteHistory.forEach(h=>{h.tags.forEach(t=>{ts[t]=(ts[t]||0)+1})});const meal=state.currentMeal;let pool=DISHES.filter(d=>d.meals.includes(meal));pool.sort((a,b)=>a.tags.reduce((s,t)=>s-(ts[t]||0),0)-b.tags.reduce((s,t)=>s-(ts[t]||0),0));return pool[0]||null}

// ========== Add One Dish ==========
function addOneDish(cat){
  const meal=state.currentMeal;const people=state.dinerCount;
  const totalTargets=getNutritionTargets();
  const mealRatio=getMealNutritionRatio();
  const mealTargets={protein:totalTargets.protein*mealRatio,carbs:totalTargets.carbs*mealRatio,fat:totalTargets.fat*mealRatio};
  const curNutri=getCurrentNutrition();
  const gap={protein:Math.max(0,mealTargets.protein-curNutri.protein),carbs:Math.max(0,mealTargets.carbs-curNutri.carbs),fat:Math.max(0,mealTargets.fat-curNutri.fat)};
  const isLow=(curNutri.protein/mealTargets.protein<0.6)||(curNutri.carbs/mealTargets.carbs<0.6)||(curNutri.fat/mealTargets.fat<0.6);
  const nutriCtx={isLow,gap};
  let pool;if(cat==='dish')pool=DISHES.filter(d=>d.meals.includes(meal)&&(d.cat==='meat'||d.cat==='veg'));else pool=DISHES.filter(d=>d.meals.includes(meal)&&d.cat===cat);
  pool=pool.filter(d=>people>=d.people[0]&&people<=d.people[1]);pool=filterRestrictions(pool,state.dietaryRestrictions);
  const curIds=[];Object.values(state.currentRecommendations).forEach(a=>a.forEach(d=>curIds.push(d.id)));pool=pool.filter(d=>!curIds.includes(d.id));
  if(state.tempExcludeIngredients.length>0){pool=pool.filter(d=>!d.ingredients.some(i=>state.tempExcludeIngredients.some(ei=>i.includes(ei)||ei.includes(i))))}
  if(state.selectedIngredients.length>0){pool=pool.map(d=>{const matchCount=d.ingredients.filter(i=>state.selectedIngredients.some(si=>i.includes(si)||si.includes(i))).length;let _match=0;if(matchCount===d.ingredients.length)_match=10;else if(matchCount>0)_match=5;return{...d,_match,_matchCount:matchCount}});pool.sort((a,b)=>b._match-a._match||b._matchCount-a._matchCount)}
  pool=sortTaste(pool,nutriCtx);
  pool.sort((a,b)=>{const aS=(a._ts||0)+(a._ns||0)+(a._match||0)*2+(Math.random()-.5)*2;const bS=(b._ts||0)+(b._ns||0)+(b._match||0)*2+(Math.random()-.5)*2;return bS-aS});
  const nd=pool[0];
  if(nd){state.currentRecommendations[cat].push(nd);state.tasteHistory.push({dishId:nd.id,dishName:nd.name,tags:nd.tags,action:'accept',reason:'加一道',time:Date.now()});renderResults(state.currentRecommendations);showToast('已添加「'+nd.name+'」');saveState()}
  else showToast(CAT_CONFIG[cat].name+'没有更多菜品了');
}

// ========== Refresh Category ==========

  const totalTargets=getNutritionTargets();

  // Calculate current nutrition from other categories (excluding this one)

  Object.keys(state.currentRecommendations).forEach(c=>{
    if(c===cat)return;
    (state.currentRecommendations[c]||[]).forEach(d=>{const ratio=people/(d.servings||2);curP+=(d.protein||0)*ratio;curC+=(d.carbs||0)*ratio;curF+=(d.fat||0)*ratio});
  });
  const gap={protein:Math.max(0,mealTargets.protein-curP),carbs:Math.max(0,mealTargets.carbs-curC),fat:Math.max(0,mealTargets.fat-curF)};
  const isLow=(curP/mealTargets.protein<0.6)||(curC/mealTargets.carbs<0.6)||(curF/mealTargets.fat<0.6);
  const nutriCtx={isLow,gap};
  let pool;if(cat==='dish')pool=DISHES.filter(d=>d.meals.includes(meal)&&(d.cat==='meat'||d.cat==='veg'));else pool=DISHES.filter(d=>d.meals.includes(meal)&&d.cat===cat);
  pool=pool.filter(d=>people>=d.people[0]&&people<=d.people[1]);pool=filterRestrictions(pool,state.dietaryRestrictions);
  const curIds=(state.currentRecommendations[cat]||[]).map(d=>d.id);pool=pool.filter(d=>!curIds.includes(d.id));
  if(state.tempExcludeIngredients.length>0){pool=pool.filter(d=>!d.ingredients.some(i=>state.tempExcludeIngredients.some(ei=>i.includes(ei)||ei.includes(i))))}
  if(state.selectedIngredients.length>0){pool=pool.map(d=>{const matchCount=d.ingredients.filter(i=>state.selectedIngredients.some(si=>i.includes(si)||si.includes(i))).length;let _match=0;if(matchCount===d.ingredients.length)_match=10;else if(matchCount>0)_match=5;return{...d,_match,_matchCount:matchCount}});pool.sort((a,b)=>b._match-a._match||b._matchCount-a._matchCount)}
  pool=sortTaste(pool,nutriCtx);
  pool.sort((a,b)=>{const aS=(a._ts||0)+(a._ns||0)+(a._match||0)*2+(Math.random()-.5)*2;const bS=(b._ts||0)+(b._ns||0)+(b._match||0)*2+(Math.random()-.5)*2;return bS-aS});
  const newDishes=pool.slice(0,Math.min(dishCount,pool.length));
  if(newDishes.length>0){state.currentRecommendations[cat]=newDishes;recordInitialRecommendation(cat,newDishes.length);renderResults(state.currentRecommendations);showToast('已刷新'+CAT_CONFIG[cat].name)}else showToast(CAT_CONFIG[cat].name+'没有更多菜品了');
}

// ========== Remove Dish ==========
function removeDish(cat,idx,id){
  const dish=DISHES.find(d=>d.id===id);if(!dish)return;
  state.tasteHistory.push({dishId:id,dishName:dish.name,tags:dish.tags,action:'reject',reason:'',time:Date.now()});
  const opts=genFeedback(dish);showFeedback(dish,opts,cat,idx);
}
function genFeedback(dish){
  const o=[];
  if(dish.tags.includes('油腻'))o.push({text:'不想吃太油腻',tags:['油腻']});
  if(dish.tags.includes('清淡'))o.push({text:'不想吃太清淡',tags:['清淡']});
  if(dish.tags.includes('辣'))o.push({text:'不想吃辣的',tags:['辣']});
  if(dish.tags.includes('慢炖'))o.push({text:'不想做太费时间的',tags:['慢炖']});
  const mi=dish.ingredients[0];if(mi&&!['姜','蒜','葱','盐','酱油','醋'].includes(mi))o.push({text:'不想吃'+mi,tags:[],ingredient:mi});
  o.push({text:'换个别的',tags:[]});
  o.push({text:'不要了',tags:[],removeOnly:true});return o;
}
function showFeedback(dish,opts,cat,idx){
  const m=$('#feedbackModal');const t=$('#feedbackTitle');const c=$('#feedbackOptions');
  t.textContent='为什么不想吃「'+dish.name+'」？';
  c.innerHTML=opts.map((o,i)=>`<div class="feedback-option" data-i="${i}">${o.text}</div>`).join('');
  m.classList.add('show');
  c.querySelectorAll('.feedback-option').forEach(el=>{el.addEventListener('click',()=>{const fb=opts[parseInt(el.dataset.i)];if(fb.removeOnly){directRemoveDish(cat,idx,dish);m.classList.remove('show')}else{applyFeedback(cat,idx,fb,dish);m.classList.remove('show')}})});
  $('#feedbackSkip').onclick=()=>{applyFeedback(cat,idx,{text:'换个别的',tags:[]},dish);m.classList.remove('show')};
  m.addEventListener('click',e=>{if(e.target===m){applyFeedback(cat,idx,{text:'换个别的',tags:[]},dish);m.classList.remove('show')}});
}
function directRemoveDish(cat,idx,dish){
  // Remove without replacement - learn preference
  if(state.tasteHistory.length>0){const last=state.tasteHistory[state.tasteHistory.length-1];if(last.dishId===dish.id)last.reason='不要了'}
  state.currentRecommendations[cat].splice(idx,1);

}
function applyFeedback(cat,idx,fb,removed){
  if(state.tasteHistory.length>0){const last=state.tasteHistory[state.tasteHistory.length-1];if(last.dishId===removed.id)last.reason=fb.text}
  const meal=state.currentMeal;const people=state.dinerCount;

  let curP=0,curC=0,curF=0;

    (state.currentRecommendations[c]||[]).forEach((d,i)=>{
      if(c===cat&&i===idx)return;
      const ratio=people/(d.servings||2);curP+=(d.protein||0)*ratio;curC+=(d.carbs||0)*ratio;curF+=(d.fat||0)*ratio;
    });
  });
  const gap={protein:Math.max(0,mealTargets.protein-curP),carbs:Math.max(0,mealTargets.carbs-curC),fat:Math.max(0,mealTargets.fat-curF)};
  const isLow=(curP/mealTargets.protein<0.6)||(curC/mealTargets.carbs<0.6)||(curF/mealTargets.fat<0.6);
  const nutriCtx={isLow,gap};
  let pool;if(cat==='dish')pool=DISHES.filter(d=>d.meals.includes(meal)&&(d.cat==='meat'||d.cat==='veg')&&d.id!==removed.id);else pool=DISHES.filter(d=>d.meals.includes(meal)&&d.cat===cat&&d.id!==removed.id);
  pool=filterRestrictions(pool,state.dietaryRestrictions);
  const curIds=[];Object.values(state.currentRecommendations).forEach(a=>a.forEach(d=>curIds.push(d.id)));pool=pool.filter(d=>!curIds.includes(d.id));
  if(state.tempExcludeIngredients.length>0){pool=pool.filter(d=>!d.ingredients.some(i=>state.tempExcludeIngredients.some(ei=>i.includes(ei)||ei.includes(i))))}
  if(fb.tags&&fb.tags.length)pool=pool.filter(d=>!d.tags.some(t=>fb.tags.includes(t)));
  if(fb.ingredient)pool=pool.filter(d=>!d.ingredients.includes(fb.ingredient));
  pool=sortTaste(pool,nutriCtx);
  pool.sort((a,b)=>{const aS=(a._ts||0)+(a._ns||0)+(Math.random()-.5)*2;const bS=(b._ts||0)+(b._ns||0)+(Math.random()-.5)*2;return bS-aS});
  const nd=pool[0];
  if(nd){state.currentRecommendations[cat][idx]=nd;state.tasteHistory.push({dishId:nd.id,dishName:nd.name,tags:nd.tags,action:'accept',reason:fb.text,time:Date.now()});renderResults(state.currentRecommendations);showToast('已换为「'+nd.name+'」')}
  else{state.currentRecommendations[cat].splice(idx,1);learnFromCurrentRecommendations();renderResults(state.currentRecommendations);showToast('没有更合适的了，已移除')}
  saveState();
}

// ========== Recipe Modal ==========
function showRecipe(dish){
  const m=$('#recipeModal');const s=$('#recipeSheet');const catKey=(dish.cat==='meat'||dish.cat==='veg')?'dish':dish.cat;const cfg=CAT_CONFIG[catKey]||CAT_CONFIG.dish;const people=state.dinerCount;const baseS=dish.servings||2;const ratio=people/baseS;
  const adjCal=Math.round(dish.cal*ratio);const adjP=Math.round(dish.protein*ratio*10)/10;const adjC=Math.round(dish.carbs*ratio*10)/10;const adjF=Math.round(dish.fat*ratio*10)/10;
  // Build ingredient scaling info
  let servingsInfo=`<div style="margin-top:8px;padding:8px 12px;border-radius:10px;background:var(--bg-warm);font-size:.8rem;color:var(--text)">`;
  servingsInfo+=`<strong>份量参考：</strong>标准${baseS}人份 → 当前${people}人份（${people<=baseS?'1':'约'+ratio.toFixed(1)}倍量）`;
  if(people!==baseS){servingsInfo+=`<br><span style="color:var(--primary)">食材用量按比例调整即可</span>`}
  servingsInfo+=`</div>`;
  s.innerHTML=`
    <button class="recipe-close" id="rcClose">✕</button>
    <div class="recipe-img-area"><img src="${imgUrl(dish.img)}" alt="${dish.name}" style="width:100%;max-height:180px;object-fit:cover;border-radius:14px" onerror="this.style.display='none'"></div>
    <div class="recipe-title">${dish.name}</div>
    <div class="recipe-desc">${dish.desc}</div>
    <div class="recipe-nutrition">
      <span class="rn-chip rn-time">⏱ ${dish.cookTime||'?'}分钟</span>
      <span class="rn-chip rn-cal">🔥 ${adjCal}kcal/${people}人份</span>
      <span class="rn-chip rn-pro">🥩 蛋白${adjP}g</span>
      <span class="rn-chip rn-carb">🌾 碳水${adjC}g</span>
      <span class="rn-chip rn-fat">🧈 脂肪${adjF}g</span>
    </div>
    <div class="recipe-ingredients"><h4>🥘 所需食材</h4><div class="tags">${dish.ingredients.map(i=>`<span>${i}</span>`).join('')}</div>${servingsInfo}</div>
    <div class="recipe-steps"><h4>👨‍🍳 做法简述</h4><p>${dish.steps}</p></div>`;
  m.classList.add('show');s.querySelector('#rcClose').addEventListener('click',()=>m.classList.remove('show'));m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('show')});
}

// ========== Nutrition Overview ==========
function getNutritionTargets(){
  const t=getDailyTargets();const people=state.dinerCount;
  return{protein:t.protein*people,carbs:t.carbs*people,fat:t.fat*people};
}
function getCurrentNutrition(){
  let tp=0,tc=0,tf=0;const people=state.dinerCount;
  Object.values(state.currentRecommendations).forEach(arr=>arr.forEach(d=>{const ratio=people/(d.servings||2);tp+=(d.protein||0)*ratio;tc+=(d.carbs||0)*ratio;tf+=(d.fat||0)*ratio}));
  return{protein:Math.round(tp),carbs:Math.round(tc),fat:Math.round(tf)};
}
function renderNutritionOverview(recs){
  const area=$('#nutritionArea');if(!area)return;
  let tp=0,tc=0,tf=0;const people=state.dinerCount;
  Object.values(recs).forEach(arr=>arr.forEach(d=>{const ratio=people/(d.servings||2);tp+=Math.round((d.protein||0)*ratio*10)/10;tc+=Math.round((d.carbs||0)*ratio*10)/10;tf+=Math.round((d.fat||0)*ratio*10)/10}));
  tp=Math.round(tp);tc=Math.round(tc);tf=Math.round(tf);
  const targets=getNutritionTargets();
  const daily=getDailyTargets();
  const mealRatio=getMealNutritionRatio();
  const mealLinePct=Math.round(mealRatio*100);
  const mealName=MEAL_NAMES[state.currentMeal]||'本餐';
  const mealTargets={protein:Math.round(targets.protein*mealRatio),carbs:Math.round(targets.carbs*mealRatio),fat:Math.round(targets.fat*mealRatio)};
  // Meal bar: actual / meal target
  const pMealPct=Math.round(tp/mealTargets.protein*100),cMealPct=Math.round(tc/mealTargets.carbs*100),fMealPct=Math.round(tf/mealTargets.fat*100);
  // Daily bar: actual / daily target
  const pDailyPct=Math.round(tp/targets.protein*100),cDailyPct=Math.round(tc/targets.carbs*100),fDailyPct=Math.round(tf/targets.fat*100);
  const overallPct=Math.round((tp+tc+tf)/(targets.protein+targets.carbs+targets.fat)*100);
  function barColor(pct){if(pct>100)return'linear-gradient(90deg,#E84233,#EF5350)';if(pct>=75)return'linear-gradient(90deg,#4CAF50,#66BB6A)';return'linear-gradient(90deg,#FF9800,#FFB74D)'}
  function mealStatusClass(actual,mealTarget,dailyTarget){if(actual>dailyTarget)return'nutri-meal-over';if(actual>=mealTarget)return'nutri-meal-ok';return'nutri-meal-low'}
  function barWidth(pct){return Math.min(pct,100)+'%'}
  function mealGoalLine(pct){return`<div class="nutri-meal-line" style="left:${Math.min(pct,100)}%"></div><span class="nutri-meal-label" style="left:${Math.min(pct,100)}%">本餐建议</span>`}
  // Build dual-bar row for each nutrient
  function dualBarRow(cls,label,actual,mTarget,dTarget,mPct,dPct){
    const mW=barWidth(mPct),dW=barWidth(dPct);
    const goalPct=100; // meal goal line is at 100% of meal bar
    return`<div class="nutri-row ${cls}"><span class="nutri-label">${label}</span><div class="nutri-bars">`+
    `<div class="nutri-bar-line"><span class="nutri-bar-hint">本餐</span><div class="nutri-bar-bg"><div class="nutri-bar-fill" style="width:${mW};background:${barColor(mPct)}"></div>${mealGoalLine(goalPct)}</div></div>`+
    `<div class="nutri-bar-line"><span class="nutri-bar-hint">每日</span><div class="nutri-bar-bg"><div class="nutri-bar-fill nutri-bar-daily-fill" style="width:${dW}"></div></div></div>`+
    `</div><span class="nutri-val"><span class="nutri-val-meal ${mealStatusClass(actual,mTarget,dTarget)}">本餐 ${actual}g / ${mTarget}g</span><span class="nutri-val-daily">今日 ${actual}g / ${dTarget}g</span></span></div>`;
  }
  const isPanelOpen=area.querySelector('.nutrition-adjust-panel.open')!==null;
  let activePreset='';
  for(let i=0;i<NUTRITION_PRESETS.length;i++){if(NUTRITION_PRESETS[i].protein===daily.protein&&NUTRITION_PRESETS[i].carbs===daily.carbs&&NUTRITION_PRESETS[i].fat===daily.fat){activePreset=NUTRITION_PRESETS[i].id;break}}
  area.innerHTML=`<div class="nutrition-bar"><div class="nutrition-title">📊 本餐营养 · 已达每日推荐 ${overallPct}%</div>
    ${dualBarRow('nutri-protein','蛋白质',tp,mealTargets.protein,targets.protein,pMealPct,pDailyPct)}
    ${dualBarRow('nutri-carbs','碳水',tc,mealTargets.carbs,targets.carbs,cMealPct,cDailyPct)}
    ${dualBarRow('nutri-fat','脂肪',tf,mealTargets.fat,targets.fat,fMealPct,fDailyPct)}
    <div style="font-size:.68rem;color:var(--text-light);margin-top:2px;text-align:center">本餐建议占每日 ${mealLinePct}%（${mealName}）</div>
    <button class="nutrition-adjust-btn" id="btnNutriAdjust">${isPanelOpen?'🔼 收起':'⚙️ 调整营养目标'}</button>
    <div class="nutrition-adjust-panel ${isPanelOpen?'open':''}" id="nutriAdjustPanel">
      <div class="nap-title">选择营养模式</div>
      <div class="nap-presets">${NUTRITION_PRESETS.map(p=>`<button class="nap-preset ${activePreset===p.id?'active':''}" data-preset="${p.id}">${p.name}</button>`).join('')}</div>
      <div class="nap-title" style="margin-top:4px">手动调节</div>
      <div class="nap-slider-group"><div class="nap-slider-label"><span>蛋白质</span><span id="napProteinVal">${daily.protein}g</span></div><input type="range" class="nap-slider" id="napProteinSlider" min="30" max="200" value="${daily.protein}"></div>
      <div class="nap-slider-group"><div class="nap-slider-label"><span>碳水</span><span id="napCarbsVal">${daily.carbs}g</span></div><input type="range" class="nap-slider" id="napCarbsSlider" min="20" max="400" value="${daily.carbs}"></div>
      <div class="nap-slider-group"><div class="nap-slider-label"><span>脂肪</span><span id="napFatVal">${daily.fat}g</span></div><input type="range" class="nap-slider" id="napFatSlider" min="15" max="120" value="${daily.fat}"></div>
    </div></div>`;
  bindNutriAdjustEvents();
}
function bindNutriAdjustEvents(){
  const btn=$('#btnNutriAdjust');
  if(btn)btn.addEventListener('click',()=>{
    const panel=$('#nutriAdjustPanel');
    if(panel)panel.classList.toggle('open');
    btn.textContent=panel.classList.contains('open')?'🔼 收起':'⚙️ 调整营养目标';
  });
  $$('.nap-preset').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const preset=NUTRITION_PRESETS.find(p=>p.id===btn.dataset.preset);
      if(preset){
        state.nutritionTargets={protein:preset.protein,carbs:preset.carbs,fat:preset.fat};
        saveNutritionTargets();
        syncNapSliders();
        $$('.nap-preset').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        renderNutritionOverview(state.currentRecommendations);
      }
    });
  });
  const pSlider=$('#napProteinSlider');const cSlider=$('#napCarbsSlider');const fSlider=$('#napFatSlider');
  if(pSlider)pSlider.addEventListener('input',()=>{state.nutritionTargets.protein=parseInt(pSlider.value);$('#napProteinVal').textContent=pSlider.value+'g';saveNutritionTargets();updateNapPresetHighlight();renderNutritionOverview(state.currentRecommendations)});
  if(cSlider)cSlider.addEventListener('input',()=>{state.nutritionTargets.carbs=parseInt(cSlider.value);$('#napCarbsVal').textContent=cSlider.value+'g';saveNutritionTargets();updateNapPresetHighlight();renderNutritionOverview(state.currentRecommendations)});
  if(fSlider)fSlider.addEventListener('input',()=>{state.nutritionTargets.fat=parseInt(fSlider.value);$('#napFatVal').textContent=fSlider.value+'g';saveNutritionTargets();updateNapPresetHighlight();renderNutritionOverview(state.currentRecommendations)});
}
function syncNapSliders(){
  const t=getDailyTargets();
  const pSlider=$('#napProteinSlider');if(pSlider){pSlider.value=t.protein;$('#napProteinVal').textContent=t.protein+'g'}
  const cSlider=$('#napCarbsSlider');if(cSlider){cSlider.value=t.carbs;$('#napCarbsVal').textContent=t.carbs+'g'}
  const fSlider=$('#napFatSlider');if(fSlider){fSlider.value=t.fat;$('#napFatVal').textContent=t.fat+'g'}
}
function updateNapPresetHighlight(){
  const t=getDailyTargets();
  $$('.nap-preset').forEach(btn=>{
    const p=NUTRITION_PRESETS.find(p=>p.id===btn.dataset.preset);
    if(p)btn.classList.toggle('active',p.protein===t.protein&&p.carbs===t.carbs&&p.fat===t.fat);
  });
}

// ========== Sidebar ==========
function initSidebar(){$('#btnSidebar').addEventListener('click',openSidebar);$('#sidebarClose').addEventListener('click',closeSidebar);$('#sidebarOverlay').addEventListener('click',closeSidebar);$('#sbPeoplePlus').addEventListener('click',()=>{if(state.dinerCount<12){state.dinerCount++;updateSidebar();checkDinerChange()}});$('#sbPeopleMinus').addEventListener('click',()=>{if(state.dinerCount>1){state.dinerCount--;updateSidebar();checkDinerChange()}})}
function openSidebar(){renderSidebarMeals();updateSidebar();$('#sidebarOverlay').classList.add('show');$('#sidebar').classList.add('show');$('#sbHint').classList.remove('show')}
function closeSidebar(){$('#sidebarOverlay').classList.remove('show');$('#sidebar').classList.remove('show')}
function renderSidebarMeals(){const c=$('#sbMealCards');let h='';MEAL_ORDER.forEach(m=>{h+=`<div class="sb-meal ${m===state.currentMeal?'active':''}" data-meal="${m}">${MEAL_EMOJIS[m]} ${MEAL_NAMES[m]}</div>`});c.innerHTML=h;c.querySelectorAll('.sb-meal').forEach(el=>{el.addEventListener('click',()=>{switchMeal(el.dataset.meal);c.querySelectorAll('.sb-meal').forEach(x=>x.classList.remove('active'));el.classList.add('active');runRecommendation();closeSidebar()})})}
function updateSidebar(){$('#sbPeopleVal').textContent=state.dinerCount+'人'}
function checkDinerChange(){const prev=state.previousDinerCount;const cur=state.dinerCount;if(prev!==cur){const totalDishes=Object.values(state.currentRecommendations).reduce((s,a)=>s+a.length,0);const cats=MEAL_CATS[state.currentMeal]||[];let expected=0;cats.forEach(c=>{if(state.categoryEnabled[c])expected+=getDishCount(c,cur)});let msg=`${cur}人用餐建议${expected}道菜，当前已有${totalDishes}道`;if(totalDishes<expected)msg+='，可能需要加几道';else if(totalDishes>expected+2)msg+='，可能需要减几道';const hint=$('#sbHint');hint.textContent=msg;hint.classList.add('show');hint.innerHTML=msg+`<div class="sb-hint-actions"><button class="sb-hint-btn primary" id="sbSupplement">重新推荐</button><button class="sb-hint-btn secondary" id="sbKeep">保持现状</button></div>`;$('#sbSupplement').addEventListener('click',()=>{state.previousDinerCount=cur;runRecommendation();closeSidebar();showToast('已重新推荐')});$('#sbKeep').addEventListener('click',()=>{state.previousDinerCount=cur;closeSidebar();showToast('保持当前推荐')})}}

// ========== Restrictions ==========
function initRestrictions(){const m=$('#restrictModal');const c=$('#restrictTags');function render(){c.innerHTML=PRESET_RESTRICTIONS.map(r=>`<span class="restrict-tag ${state.dietaryRestrictions.includes(r)?'active':''}" data-r="${r}">${r}</span>`).join('')+state.dietaryRestrictions.filter(r=>!PRESET_RESTRICTIONS.includes(r)).map(r=>`<span class="restrict-tag active" data-r="${r}">${r} ✕</span>`).join('');c.querySelectorAll('.restrict-tag').forEach(t=>{t.addEventListener('click',()=>{const r=t.dataset.r;if(PRESET_RESTRICTIONS.includes(r)){state.dietaryRestrictions=state.dietaryRestrictions.includes(r)?state.dietaryRestrictions.filter(x=>x!==r):[...state.dietaryRestrictions,r]}else{state.dietaryRestrictions=state.dietaryRestrictions.filter(x=>x!==r)}render();saveState()})})}render();$('#btnRestrictions').addEventListener('click',()=>{render();m.classList.add('show')});$('#restrictClose').addEventListener('click',()=>m.classList.remove('show'));m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('show')});$('#restrictCustomAdd').addEventListener('click',()=>{const v=$('#restrictCustomInput').value.trim();if(v&&!state.dietaryRestrictions.includes(v)){state.dietaryRestrictions.push(v);$('#restrictCustomInput').value='';render();saveState()}})}

// ========== Shopping List ==========
function renderShoppingList(recs){
  const ingMap={};
  const people=state.dinerCount;
  // Collect all ingredients from recommended dishes
  Object.values(recs).forEach(arr=>arr.forEach(d=>{
    (d.ingredients||[]).forEach(i=>{
      if(!ingMap[i])ingMap[i]=0;
      ingMap[i]++;
    });
  }));
  const entries=Object.entries(ingMap).sort((a,b)=>b[1]-a[1]);
  if(entries.length===0)return '';
  let html=`<div class="shopping-list"><div class="shopping-title">🛒 食材采购清单</div><div class="shopping-tags">`;
  entries.forEach(([name,count])=>{
    const countLabel=count>1?`<span class="shop-count">×${count}</span>`:'';
    html+=`<span class="shop-tag" data-ing="${name}">${name}${countLabel}<button class="shop-tag-x" data-ing="${name}" title="操作">✕</button></span>`;
  });
  html+=`</div></div>`;
  return html;
}

// ========== Ingredient Action Modal ==========
function showIngActionModal(ingredient){
  const m=$('#ingActionModal');
  const t=$('#ingActionTitle');
  const c=$('#ingActionOptions');
  t.textContent=`对「${ingredient}」的操作`;
  c.innerHTML=`
    <div class="ing-action-option" data-action="temp">😔 今天不太想吃${ingredient}</div>
    <div class="ing-action-option danger" data-action="permanent">🚫 不能吃${ingredient}</div>
  `;
  m.classList.add('show');
  c.querySelectorAll('.ing-action-option').forEach(el=>{
    el.addEventListener('click',()=>{
      const action=el.dataset.action;
      if(action==='temp'){
        // Add to temp exclude list
        if(!state.tempExcludeIngredients.includes(ingredient)){
          state.tempExcludeIngredients.push(ingredient);
        }
        // Remove dishes containing this ingredient from current recommendations
        removeIngredientFromRecs(ingredient);
        showToast(`已排除含「${ingredient}」的菜品，本次不再推荐`);
      }else if(action==='permanent'){
        // Add to dietary restrictions
        const restrictItem='不吃'+ingredient;
        if(!state.dietaryRestrictions.includes(restrictItem)){
          state.dietaryRestrictions.push(restrictItem);
          saveState();
        }
        // Remove dishes containing this ingredient from current recommendations
        removeIngredientFromRecs(ingredient);
        showToast(`已添加「${restrictItem}」到忌口，以后不再推荐含${ingredient}的菜品`);
      }
      m.classList.remove('show');
      renderResults(state.currentRecommendations);
      renderNutritionOverview(state.currentRecommendations);
    });
  });
  $('#ingActionCancel').onclick=()=>m.classList.remove('show');
  m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('show')});
}

function removeIngredientFromRecs(ingredient){
  // Remove dishes containing the ingredient from current recommendations
  Object.keys(state.currentRecommendations).forEach(cat=>{
    state.currentRecommendations[cat]=state.currentRecommendations[cat].filter(d=>!d.ingredients.some(i=>i.includes(ingredient)||ingredient.includes(i)));
  });
  // Re-fill removed dishes
  const cats=MEAL_CATS[state.currentMeal]||[];
  cats.forEach(cat=>{
    if(!state.categoryEnabled[cat])return;
    const desired=getDishCount(cat,state.dinerCount);
    const current=(state.currentRecommendations[cat]||[]).length;
    if(current<desired){
      // Add dishes to fill the gap
      const meal=state.currentMeal;const people=state.dinerCount;
      let pool;if(cat==='dish')pool=DISHES.filter(d=>d.meals.includes(meal)&&(d.cat==='meat'||d.cat==='veg'));else pool=DISHES.filter(d=>d.meals.includes(meal)&&d.cat===cat);
      pool=pool.filter(d=>people>=d.people[0]&&people<=d.people[1]);
      pool=filterRestrictions(pool,state.dietaryRestrictions);
      if(state.tempExcludeIngredients.length>0){pool=pool.filter(d=>!d.ingredients.some(i=>state.tempExcludeIngredients.some(ei=>i.includes(ei)||ei.includes(i))))}
      const curIds=[];Object.values(state.currentRecommendations).forEach(a=>a.forEach(d=>curIds.push(d.id)));
      pool=pool.filter(d=>!curIds.includes(d.id));
      if(state.selectedIngredients.length>0){pool=pool.map(d=>{const mc=d.ingredients.filter(i=>state.selectedIngredients.some(si=>i.includes(si)||si.includes(i))).length;let _match=0;if(mc===d.ingredients.length)_match=10;else if(mc>0)_match=5;return{...d,_match,_matchCount:mc}});pool.sort((a,b)=>b._match-a._match||b._matchCount-a._matchCount)}
      pool=sortTaste(pool,{isLow:true,gap:{protein:0,carbs:0,fat:0}});
      pool.sort((a,b)=>{const aS=(a._ts||0)+(a._ns||0)+(a._match||0)*2+(Math.random()-.5)*2;const bS=(b._ts||0)+(b._ns||0)+(b._match||0)*2+(Math.random()-.5)*2;return bS-aS});
      const needed=desired-current;
      const newDishes=pool.slice(0,needed);
      if(!state.currentRecommendations[cat])state.currentRecommendations[cat]=[];
      state.currentRecommendations[cat].push(...newDishes);
    }
  });
}

// ========== Refresh All ==========
function refreshAllCats(){state.tempExcludeIngredients=[];const meal=state.currentMeal;const people=state.dinerCount;const cats=MEAL_CATS[meal]||[];cats.forEach(cat=>{if(!state.categoryEnabled[cat])return;const overrideCount=Math.max(getDishCount(cat,people),(state.currentRecommendations[cat]||[]).length);state._recCountOverride=state._recCountOverride||{};state._recCountOverride[cat]=overrideCount});const recs=getRecommendations();delete state._recCountOverride;state.currentRecommendations=recs;renderResults(recs);showToast('已换一批推荐')}

// ========== Service Worker ==========
function registerSW(){if('serviceWorker'in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}}

// ========== Init ==========
function init(){loadState();loadMealToggles(state.currentMeal);initStep1();initStep2();initStep3();initSidebar();initRestrictions();registerSW();$('#btnRefreshAll').addEventListener('click',refreshAllCats)}
document.addEventListener('DOMContentLoaded',init);

</script>
